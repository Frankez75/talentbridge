<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · Artwork Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .page-header {
            background: linear-gradient(135deg, #111100 0%, #2a2a1a 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 32px 32px;
        }
        .filter-section {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #efefe7;
            margin-bottom: 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .form-control, .form-select {
            border: 1.5px solid #e0e0d5;
            border-radius: 16px;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #e67300;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,115,0,0.1);
        }
        .btn-primary-custom {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 2rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
            transform: scale(1.02);
        }
        .btn-logout {
            background-color: #e67300;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .artwork-card {
            background: #FFFFFF;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #efefe7;
            transition: all 0.4s ease;
            height: 100%;
            cursor: pointer;
            position: relative;
        }
        .artwork-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .artwork-image-wrapper {
            position: relative;
            overflow: hidden;
            height: 260px;
        }
        .artwork-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }
        .artwork-card:hover .artwork-image {
            transform: scale(1.05);
        }
        .artwork-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(17, 17, 0, 0.4);
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .artwork-card:hover .artwork-overlay {
            opacity: 1;
        }
        .artwork-overlay i {
            color: white;
            font-size: 2.5rem;
        }
        .artwork-info {
            padding: 1.25rem;
        }
        .artwork-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        .artwork-artist {
            color: #e67300;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .artwork-price {
            color: #111100;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .badge-category {
            background: #fff4eb;
            color: #e67300;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .rating-stars {
            color: #ffc107;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .btn-favorite {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(255,255,255,0.9);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .btn-favorite:hover {
            background: #e67300;
            color: white;
            transform: scale(1.1);
        }
        .btn-favorite.active {
            background: #e67300;
            color: white;
        }
        .toggle-view {
            display: flex;
            gap: 0.5rem;
        }
        .toggle-view button {
            border: 1.5px solid #e0e0d5;
            background: transparent;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .toggle-view button.active {
            background: #e67300;
            color: white;
            border-color: #e67300;
        }
        .toggle-view button:hover {
            background: #fff4eb;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #FFFFFF;
            border-radius: 20px;
            border: 2px dashed #e0e0d5;
        }
        .empty-state i {
            font-size: 4rem;
            color: #e67300;
            margin-bottom: 1rem;
        }
        .load-more-btn {
            display: block;
            margin: 2rem auto;
            padding: 0.75rem 3rem;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .artwork-card {
            animation: fadeInUp 0.5s ease-out;
        }
        footer {
            background: #FFFFFF;
            padding: 2rem 0;
            border-top: 1px solid #efefe7;
            margin-top: 3rem;
        }
        .pagination-custom .page-link {
            border: none;
            color: #111100;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            margin: 0 0.25rem;
            transition: all 0.3s ease;
        }
        .pagination-custom .page-link:hover {
            background: #fff4eb;
            color: #e67300;
        }
        .pagination-custom .page-item.active .page-link {
            background: #e67300;
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        <div>
            <span class="me-3" style="color: #e67300; font-weight: 600;" id="userNameDisplay">Guest</span>
            <a href="login.html" class="btn-outline-custom" style="border: 1.5px solid #111100; background: transparent; color: #111100; padding: 0.5rem 1.5rem; border-radius: 40px; text-decoration: none; font-weight: 600; margin-right: 0.75rem;">Sign In</a>
            <a href="register.html" class="btn-primary-custom" style="background-color: #e67300; color: white; padding: 0.5rem 1.5rem; border-radius: 40px; text-decoration: none; font-weight: 600;">Join</a>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="display-4 fw-bold mb-2">Artwork Gallery</h1>
                <p class="lead mb-0" style="opacity: 0.9;">Discover unique pieces from talented artists</p>
            </div>
            <div>
                <span class="badge bg-light text-dark rounded-pill px-4 py-2" id="resultCount">0 artworks</span>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="filter-section">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label fw-semibold"><i class="bi bi-search"></i> Search</label>
                <input type="text" class="form-control" id="searchInput" placeholder="Search artworks...">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold"><i class="bi bi-tag"></i> Category</label>
                <select class="form-select" id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="Painting">Painting</option>
                    <option value="Sculpture">Sculpture</option>
                    <option value="Craft">Craft</option>
                    <option value="Digital Art">Digital Art</option>
                    <option value="Photography">Photography</option>
                    <option value="Jewelry">Jewelry</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold"><i class="bi bi-currency-dollar"></i> Min Price</label>
                <input type="number" class="form-control" id="minPrice" placeholder="0" min="0">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold"><i class="bi bi-currency-dollar"></i> Max Price</label>
                <input type="number" class="form-control" id="maxPrice" placeholder="5000" min="0">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold"><i class="bi bi-sort"></i> Sort By</label>
                <div class="d-flex gap-2">
                    <select class="form-select" id="sortFilter">
                        <option value="newest">Newest First</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="popular">Most Popular</option>
                        <option value="rating">Highest Rated</option>
                    </select>
                    <button class="btn-primary-custom" id="applyFiltersBtn" style="padding: 0.6rem 1rem;"><i class="bi bi-funnel"></i></button>
                </div>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <button class="btn-outline-custom btn-sm" id="clearFiltersBtn"><i class="bi bi-x-circle"></i> Clear All Filters</button>
                    <div class="toggle-view">
                        <button class="active" id="gridViewBtn" title="Grid View"><i class="bi bi-grid-3x3-gap-fill"></i></button>
                        <button id="listViewBtn" title="List View"><i class="bi bi-list-ul"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row" id="artworksContainer"></div>

    <div class="d-flex justify-content-center mt-4">
        <nav>
            <ul class="pagination pagination-custom" id="paginationContainer"></ul>
        </nav>
    </div>
</div>

<footer>
    <div class="container text-center">
        <p class="text-secondary">&copy; 2025 TalentBridge. Discover art, support artists.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

        },
        {

            artist: 'James Wilson',
            artistId: 104,
            price: 420,
            category: 'Sculpture',
            rating: 4.4,
            reviews: 17,
            image: 'https://images.unsplash.com/photo-1561414927-6d86591d0c4c?w=600&h=500&fit=crop',
            description: 'Set of three hand-carved wooden sculptures.',
            createdAt: '2024-05-15'
        },
        {
            id: 12,
            title: 'Golden Hour',
            artist: 'Lisa Wong',
            artistId: 105,
            price: 620,
            category: 'Photography',
            rating: 4.9,
            reviews: 42,
            image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&h=500&fit=crop',
            description: 'Golden hour landscape photography.',
            createdAt: '2024-05-12'
        }
    ];

    let currentView = 'grid';
    let currentPage = 1;
    let itemsPerPage = 6;
    let filteredArtworks = [...allArtworks];

    function saveFavorites() {
        localStorage.setItem('tb_patron_favorites', JSON.stringify(favorites));
    }

    function isFavorite(artworkId) {
        return favorites.some(function(f) { return f.id === artworkId; });
    }

    function toggleFavorite(artworkId, event) {
        if(event) {
            event.stopPropagation();
        }
        
        if(!currentUser || userType !== 'patron') {
            if(confirm('Please sign in to save favorites. Go to login?')) {
                window.location.href = 'login.html';
            }
            return;
        }
        
        let index = favorites.findIndex(function(f) { return f.id === artworkId; });
        if(index !== -1) {
            favorites.splice(index, 1);
        } else {
            let art = allArtworks.find(function(a) { return a.id === artworkId; });
            if(art) {
                favorites.push({
                    id: art.id,
                    title: art.title,
                    artist: art.artist,
                    price: art.price,
                    image: art.image,
                    category: art.category
                });
            }
        }
        saveFavorites();
        renderArtworks();
    }

    function renderArtworks() {
        let container = document.getElementById('artworksContainer');
        let start = (currentPage - 1) * itemsPerPage;
        let end = start + itemsPerPage;
        let pageItems = filteredArtworks.slice(start, end);
        
        if(filteredArtworks.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="empty-state">
                        <i class="bi bi-image"></i>
                        <h4 class="fw-bold">No artworks found</h4>
                        <p class="text-secondary">Try adjusting your filters or search terms</p>
                        <button class="btn-primary-custom" id="resetFiltersBtn">Reset Filters</button>
                    </div>
                </div>
            `;
            document.getElementById('resultCount').innerHTML = '0 artworks';
            document.getElementById('paginationContainer').innerHTML = '';
            return;
        }

        document.getElementById('resultCount').innerHTML = filteredArtworks.length + ' artworks';

        let html = '';
        if(currentView === 'grid') {
            for(let i = 0; i < pageItems.length; i++) {
                let art = pageItems[i];
                let isFav = isFavorite(art.id);
                let favClass = isFav ? 'active' : '';
                let ratingStars = '';
                let fullStars = Math.floor(art.rating);
                for(let s = 0; s < 5; s++) {
                    ratingStars += s < fullStars ? '<i class="bi bi-star-fill"></i>' : '<i class="bi bi-star"></i>';
                }
                
                html += `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="artwork-card" data-id="${art.id}">
                            <div class="artwork-image-wrapper">
                                <img src="${art.image}" class="artwork-image" alt="${art.title}" onerror="this.src='https://placehold.co/600x500/e67300/white?text=Artwork'">
                                <div class="artwork-overlay">
                                    <i class="bi bi-eye"></i>
                                </div>
                                <button class="btn-favorite ${favClass} favorite-btn" data-id="${art.id}">
                                    <i class="bi ${isFav ? 'bi-heart-fill' : 'bi-heart'}"></i>
                                </button>
                            </div>
                            <div class="artwork-info">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <div class="artwork-title">${art.title}</div>
                                        <div class="artwork-artist"><i class="bi bi-person"></i> ${art.artist}</div>
                                    </div>
                                    <span class="badge-category">${art.category}</span>
                                </div>
                                <div class="mt-2">
                                    <span class="rating-stars">${ratingStars}</span>
                                    <span class="text-secondary" style="font-size: 0.8rem;">(${art.reviews})</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="artwork-price">$${art.price}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        } else {
            for(let i = 0; i < pageItems.length; i++) {
                let art = pageItems[i];
                let isFav = isFavorite(art.id);
                let favClass = isFav ? 'active' : '';
                let ratingStars = '';
                let fullStars = Math.floor(art.rating);
                for(let s = 0; s < 5; s++) {
                    ratingStars += s < fullStars ? '<i class="bi bi-star-fill"></i>' : '<i class="bi bi-star"></i>';
                }
                
                html += `
                    <div class="col-12 mb-3">
                        <div class="artwork-card" data-id="${art.id}" style="display: flex; flex-direction: row; align-items: center;">
                            <div class="artwork-image-wrapper" style="width: 200px; height: 160px; flex-shrink: 0;">
                                <img src="${art.image}" style="width: 100%; height: 100%; object-fit: cover;" alt="${art.title}" onerror="this.src='https://placehold.co/400x300/e67300/white?text=Artwork'">
                                <div class="artwork-overlay">
                                    <i class="bi bi-eye"></i>
                                </div>
                                <button class="btn-favorite ${favClass} favorite-btn" data-id="${art.id}">
                                    <i class="bi ${isFav ? 'bi-heart-fill' : 'bi-heart'}"></i>
                                </button>
                            </div>
                            <div class="artwork-info" style="flex: 1;">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <div class="artwork-title">${art.title}</div>
                                        <div class="artwork-artist"><i class="bi bi-person"></i> ${art.artist}</div>
                                        <div class="text-secondary small mt-1">${art.description.substring(0, 100)}${art.description.length > 100 ? '...' : ''}</div>
                                    </div>
                                    <span class="badge-category">${art.category}</span>
                                </div>
                                <div class="mt-2">
                                    <span class="rating-stars">${ratingStars}</span>
                                    <span class="text-secondary" style="font-size: 0.8rem;">(${art.reviews})</span>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="artwork-price">$${art.price}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        container.innerHTML = html;

        $('.favorite-btn').click(function(e) {
            let id = parseInt($(this).data('id'));
            toggleFavorite(id, e);
        });

        $('.artwork-card').click(function() {
            let id = parseInt($(this).data('id'));
            window.location.href = 'artwork-detail.html?id=' + id;
        });

        renderPagination();
    }

    function renderPagination() {
        let totalPages = Math.ceil(filteredArtworks.length / itemsPerPage);
        let pagination = document.getElementById('paginationContainer');
        
        if(totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" data-page="${currentPage - 1}">&laquo;</a>
        </li>`;

        for(let i = 1; i <= totalPages; i++) {
            html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" data-page="${i}">${i}</a>
            </li>`;
        }

        html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" data-page="${currentPage + 1}">&raquo;</a>
        </li>`;

        pagination.innerHTML = html;

        $('.page-link').click(function(e) {
            e.preventDefault();
            let page = parseInt($(this).data('page'));
            if(page && page >= 1 && page <= totalPages) {
                currentPage = page;
                renderArtworks();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    }

    function applyFilters() {
        let search = $('#searchInput').val().toLowerCase();
        let category = $('#categoryFilter').val();
        let minPrice = parseFloat($('#minPrice').val()) || 0;
        let maxPrice = parseFloat($('#maxPrice').val()) || Infinity;
        let sort = $('#sortFilter').val();

        filteredArtworks = allArtworks.filter(function(art) {
            let matchSearch = !search || 
                art.title.toLowerCase().includes(search) || 
                art.artist.toLowerCase().includes(search) ||
                art.category.toLowerCase().includes(search);
            let matchCategory = category === 'all' || art.category === category;
            let matchPrice = art.price >= minPrice && art.price <= maxPrice;
            return matchSearch && matchCategory && matchPrice;
        });

        if(sort === 'price-low') {
            filteredArtworks.sort(function(a, b) { return a.price - b.price; });
        } else if(sort === 'price-high') {
            filteredArtworks.sort(function(a, b) { return b.price - a.price; });
        } else if(sort === 'popular') {
            filteredArtworks.sort(function(a, b) { return b.reviews - a.reviews; });
        } else if(sort === 'rating') {
            filteredArtworks.sort(function(a, b) { return b.rating - a.rating; });
        } else if(sort === 'newest') {
            filteredArtworks.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
        }

        currentPage = 1;
        renderArtworks();
    }

    $('#applyFiltersBtn').click(function() {
        applyFilters();
    });

    $('#searchInput').on('input', function() {
        applyFilters();
    });

    $('#categoryFilter').change(function() {
        applyFilters();
    });

    $('#minPrice').on('input', function() {
        applyFilters();
    });

    $('#maxPrice').on('input', function() {
        applyFilters();
    });

    $('#sortFilter').change(function() {
        applyFilters();
    });

    $('#clearFiltersBtn').click(function() {
        $('#searchInput').val('');
        $('#categoryFilter').val('all');
        $('#minPrice').val('');
        $('#maxPrice').val('');
        $('#sortFilter').val('newest');
        applyFilters();
    });

    $(document).on('click', '#resetFiltersBtn', function() {
        $('#clearFiltersBtn').click();
    });

    $('#gridViewBtn').click(function() {
        currentView = 'grid';
        $('#gridViewBtn').addClass('active');
        $('#listViewBtn').removeClass('active');
        renderArtworks();
    });

    $('#listViewBtn').click(function() {
        currentView = 'list';
        $('#listViewBtn').addClass('active');
        $('#gridViewBtn').removeClass('active');
        renderArtworks();
    });

    applyFilters();
</script>
</body>
</html>
