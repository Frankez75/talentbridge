<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · Artwork Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .page-header {
            background: linear-gradient(135deg, #111100 0%, #2a2a1a 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 32px 32px;
        }
        .category-card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid #efefe7;
            transition: all 0.4s ease;
            cursor: pointer;
            height: 100%;
            text-align: center;
        }
        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .category-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff4eb, #fce4d6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .category-icon i {
            font-size: 2.5rem;
            color: #e67300;
        }
        .category-count {
            background: #e67300;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .filter-section {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #efefe7;
            margin-bottom: 2rem;
        }
        .form-control, .form-select {
            border: 1.5px solid #e0e0d5;
            border-radius: 16px;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #e67300;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,115,0,0.1);
        }
        .btn-primary-custom {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 2rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
            transform: scale(1.02);
        }
        .btn-logout {
            background-color: #e67300;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .artwork-card {
            background: #FFFFFF;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #efefe7;
            transition: all 0.4s ease;
            height: 100%;
            cursor: pointer;
        }
        .artwork-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.08);
        }
        .artwork-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .artwork-info {
            padding: 1.25rem;
        }
        .artwork-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        .artwork-artist {
            color: #e67300;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .artwork-price {
            color: #111100;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .badge-category {
            background: #fff4eb;
            color: #e67300;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #FFFFFF;
            border-radius: 20px;
            border: 2px dashed #e0e0d5;
        }
        .empty-state i {
            font-size: 4rem;
            color: #e67300;
            margin-bottom: 1rem;
        }
        .breadcrumb-custom {
            background: transparent;
            padding: 0;
            margin-bottom: 0;
        }
        .breadcrumb-custom .breadcrumb-item a {
            color: #6c6c5a;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .breadcrumb-custom .breadcrumb-item a:hover {
            color: #e67300;
        }
        .breadcrumb-custom .breadcrumb-item.active {
            color: #e67300;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .category-card, .artwork-card {
            animation: fadeInUp 0.5s ease-out;
        }
        footer {
            background: #FFFFFF;
            padding: 2rem 0;
            border-top: 1px solid #efefe7;
            margin-top: 3rem;
        }
        .active-category {
            background: #e67300;
            color: white;
            border-color: #e67300;
        }
        .active-category .category-icon {
            background: rgba(255,255,255,0.2);
        }
        .active-category .category-icon i {
            color: white;
        }
        .active-category .category-count {
            background: white;
            color: #e67300;
        }
        .price-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0d5;
            outline: none;
        }
        .price-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e67300;
            cursor: pointer;
        }
        .price-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e67300;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        <div>
            <span class="me-3" style="color: #e67300; font-weight: 600;" id="userNameDisplay">Guest</span>
            <a href="login.html" class="btn-outline-custom" style="border: 1.5px solid #111100; background: transparent; color: #111100; padding: 0.5rem 1.5rem; border-radius: 40px; text-decoration: none; font-weight: 600; margin-right: 0.75rem;">Sign In</a>
            <a href="register.html" class="btn-primary-custom" style="background-color: #e67300; color: white; padding: 0.5rem 1.5rem; border-radius: 40px; text-decoration: none; font-weight: 600;">Join</a>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb breadcrumb-custom">
                <li class="breadcrumb-item"><a href="index.html" style="color: rgba(255,255,255,0.7);">Home</a></li>
                <li class="breadcrumb-item"><a href="artwork-listing.html" style="color: rgba(255,255,255,0.7);">Gallery</a></li>
                <li class="breadcrumb-item active" aria-current="page" style="color: white;">Categories</li>
            </ol>
        </nav>
        <div class="d-flex justify-content-between align-items-center mt-2">
            <div>
                <h1 class="display-4 fw-bold mb-2">Browse by Category</h1>
                <p class="lead mb-0" style="opacity: 0.9;">Explore artworks by medium, style, and more</p>
            </div>
            <div>
                <span class="badge bg-light text-dark rounded-pill px-4 py-2" id="resultCount">0 categories</span>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-4" id="categoriesContainer"></div>

    <div class="filter-section mt-4">
        <h5 class="fw-bold mb-3"><i class="bi bi-funnel"></i> Filter Artworks</h5>
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label fw-semibold"><i class="bi bi-search"></i> Search</label>
                <input type="text" class="form-control" id="searchInput" placeholder="Search artworks...">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold"><i class="bi bi-tag"></i> Category</label>
                <select class="form-select" id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="Painting">Painting</option>
                    <option value="Sculpture">Sculpture</option>
                    <option value="Craft">Craft</option>
                    <option value="Digital Art">Digital Art</option>
                    <option value="Photography">Photography</option>
                    <option value="Jewelry">Jewelry</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold"><i class="bi bi-currency-dollar"></i> Min Price</label>
                <input type="number" class="form-control" id="minPrice" placeholder="0" min="0">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold"><i class="bi bi-currency-dollar"></i> Max Price</label>
                <input type="number" class="form-control" id="maxPrice" placeholder="5000" min="0">
            </div>
            <div class="col-md-3">
                <div class="d-flex gap-2">
                    <button class="btn-primary-custom" id="applyFiltersBtn"><i class="bi bi-funnel"></i> Apply Filters</button>
                    <button class="btn-outline-custom" id="clearFiltersBtn"><i class="bi bi-x-circle"></i> Clear</button>
                </div>
            </div>
        </div>
    </div>

    <h3 class="fw-bold mt-4 mb-3" id="categoryTitle">All Artworks</h3>
    <div class="row" id="artworksContainer"></div>
</div>

<footer>
    <div class="container text-center">
        <p class="text-secondary">&copy; 2025 TalentBridge. Discover art, support artists.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentUser = localStorage.getItem('tb_user_name');
    let userType = localStorage.getItem('tb_user_type');
    
    if(currentUser) {
        document.getElementById('userNameDisplay').innerText = currentUser;
    }

    let allArtworks = [
        {
            id: 1,

            price: 450,
            category: 'Painting',
            rating: 4.9,

            image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop',

        },
        {

            price: 320,
            category: 'Digital Art',
            rating: 4.5,

            image: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400&h=300&fit=crop',

        },
        {

            price: 89,
            category: 'Craft',
            rating: 4.9,

            image: 'https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=400&h=300&fit=crop',

        },
        {
            id: 6,
            title: 'Urban Rhythms',
            artist: 'James Wilson',
            price: 250,
            category: 'Photography',
            rating: 4.3,
            reviews: 14,
            image: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=400&h=300&fit=crop',
            createdAt: '2024-06-01'
        },
        {
            id: 7,
            title: 'Zen Garden',
            artist: 'Lisa Wong',
            price: 550,
            category: 'Painting',
            rating: 4.6,
            reviews: 28,
            image: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=400&h=300&fit=crop',
            createdAt: '2024-05-28'
        },
        {
            id: 8,
            title: 'Diamond Necklace',
            artist: 'Amara Okonkwo',
            price: 350,
            category: 'Jewelry',
            rating: 4.7,
            reviews: 22,
            image: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=400&h=300&fit=crop',
            createdAt: '2024-05-25'
        },
        {
            id: 9,
            title: 'Midnight Waves',
            artist: 'Sarah Chen',
            price: 780,
            category: 'Painting',
            rating: 4.8,
            reviews: 35,
            image: 'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=400&h=300&fit=crop',
            createdAt: '2024-05-20'
        },
        {
            id: 10,
            title: 'Digital Dreams',
            artist: 'David Okafor',
            price: 190,
            category: 'Digital Art',
            rating: 4.2,
            reviews: 11,
            image: 'https://images.unsplash.com/photo-1561069934-eee225952461?w=400&h=300&fit=crop',
            createdAt: '2024-05-18'
        },
        {
            id: 11,
            title: 'Wooden Sculpture Set',
            artist: 'James Wilson',
            price: 420,
            category: 'Sculpture',
            rating: 4.4,
            reviews: 17,
            image: 'https://images.unsplash.com/photo-1561414927-6d86591d0c4c?w=400&h=300&fit=crop',
            createdAt: '2024-05-15'
        },
        {
            id: 12,
            title: 'Golden Hour',
            artist: 'Lisa Wong',
            price: 620,
            category: 'Photography',
            rating: 4.9,
            reviews: 42,
            image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&h=300&fit=crop',
            createdAt: '2024-05-12'
        }
    ];

    let categories = [
        { name: 'Painting', icon: 'bi-brush', count: 0, color: '#e67300' },
        { name: 'Sculpture', icon: 'bi-gem', count: 0, color: '#6f42c1' },
        { name: 'Craft', icon: 'bi-scissors', count: 0, color: '#28a745' },
        { name: 'Digital Art', icon: 'bi-laptop', count: 0, color: '#17a2b8' },
        { name: 'Photography', icon: 'bi-camera', count: 0, color: '#dc3545' },
        { name: 'Jewelry', icon: 'bi-diamond', count: 0, color: '#ffc107' }
    ];

    let selectedCategory = 'all';
    let filteredArtworks = [...allArtworks];

    function updateCategoryCounts() {
        for(let i = 0; i < categories.length; i++) {
            let count = allArtworks.filter(function(a) { return a.category === categories[i].name; }).length;
            categories[i].count = count;
        }
    }

    function renderCategories() {
        let container = document.getElementById('categoriesContainer');
        updateCategoryCounts();

        let html = '';
        html += `
            <div class="col-md-4 col-lg-3">
                <div class="category-card ${selectedCategory === 'all' ? 'active-category' : ''}" data-category="all">
                    <div class="category-icon">
                        <i class="bi bi-grid-3x3-gap-fill"></i>
                    </div>
                    <h5 class="fw-bold">All Artworks</h5>
                    <p class="text-secondary">${allArtworks.length} pieces</p>
                </div>
            </div>
        `;

        for(let i = 0; i < categories.length; i++) {
            let cat = categories[i];
            let isActive = selectedCategory === cat.name;
            html += `
                <div class="col-md-4 col-lg-3">
                    <div class="category-card ${isActive ? 'active-category' : ''}" data-category="${cat.name}">
                        <div class="category-icon">
                            <i class="bi ${cat.icon}"></i>
                        </div>
                        <h5 class="fw-bold">${cat.name}</h5>
                        <span class="category-count">${cat.count} pieces</span>
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;

        $('.category-card').click(function() {
            let category = $(this).data('category');
            selectedCategory = category;
            document.getElementById('categoryFilter').value = category === 'all' ? 'all' : category;
            
            if(category === 'all') {
                document.getElementById('categoryTitle').innerText = 'All Artworks';
            } else {
                document.getElementById('categoryTitle').innerText = category + ' Artworks';
            }
            
            renderCategories();
            applyFilters();
        });
    }

    function applyFilters() {
        let search = $('#searchInput').val().toLowerCase();
        let category = $('#categoryFilter').val();
        let minPrice = parseFloat($('#minPrice').val()) || 0;
        let maxPrice = parseFloat($('#maxPrice').val()) || Infinity;

        if(category !== 'all') {
            selectedCategory = category;
            renderCategories();
        }

        filteredArtworks = allArtworks.filter(function(art) {
            let matchSearch = !search || 
                art.title.toLowerCase().includes(search) || 
                art.artist.toLowerCase().includes(search);
            let matchCategory = category === 'all' || art.category === category;
            let matchPrice = art.price >= minPrice && art.price <= maxPrice;
            return matchSearch && matchCategory && matchPrice;
        });

        renderArtworks();
        document.getElementById('resultCount').innerHTML = filteredArtworks.length + ' artworks';
    }

    function renderArtworks() {
        let container = document.getElementById('artworksContainer');
        
        if(filteredArtworks.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="empty-state">
                        <i class="bi bi-image"></i>
                        <h4 class="fw-bold">No artworks found</h4>
                        <p class="text-secondary">Try adjusting your filters or selecting a different category</p>
                    </div>
                </div>
            `;
            return;
        }

        let html = '';
        for(let i = 0; i < filteredArtworks.length; i++) {
            let art = filteredArtworks[i];
            html += `
                <div class="col-md-4 col-lg-3 mb-4">
                    <div class="artwork-card" onclick="window.location.href='artwork-detail.html?id=${art.id}'">
                        <img src="${art.image}" class="artwork-image" alt="${art.title}" onerror="this.src='https://placehold.co/400x300/e67300/white?text=Artwork'">
                        <div class="artwork-info">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="artwork-title">${art.title}</div>
                                    <div class="artwork-artist"><i class="bi bi-person"></i> ${art.artist}</div>
                                </div>
                                <span class="badge-category">${art.category}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <span class="artwork-price">$${art.price}</span>
                                <span class="text-secondary" style="font-size: 0.8rem;">
                                    <i class="bi bi-star-fill" style="color: #ffc107;"></i> ${art.rating}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
    }

    $('#searchInput').on('input', function() {
        applyFilters();
    });

    $('#categoryFilter').change(function() {
        let category = $(this).val();
        selectedCategory = category;
        document.getElementById('categoryTitle').innerText = category === 'all' ? 'All Artworks' : category + ' Artworks';
        renderCategories();
        applyFilters();
    });

    $('#minPrice').on('input', function() {
        applyFilters();
    });

    $('#maxPrice').on('input', function() {
        applyFilters();
    });

    $('#applyFiltersBtn').click(function() {
        applyFilters();
    });

    $('#clearFiltersBtn').click(function() {
        $('#searchInput').val('');
        $('#categoryFilter').val('all');
        $('#minPrice').val('');
        $('#maxPrice').val('');
        selectedCategory = 'all';
        document.getElementById('categoryTitle').innerText = 'All Artworks';
        renderCategories();
        applyFilters();
    });

    let urlParams = new URLSearchParams(window.location.search);
    let categoryParam = urlParams.get('category');
    if(categoryParam) {
        selectedCategory = categoryParam;
        $('#categoryFilter').val(categoryParam);
        document.getElementById('categoryTitle').innerText = categoryParam + ' Artworks';
    }

    renderCategories();
    applyFilters();
</script>
</body>
</html>
