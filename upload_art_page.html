<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · Upload & Manage Artwork</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .page-header {
            background: linear-gradient(135deg, #111100 0%, #2a2a1a 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 32px 32px;
        }
        .form-card {
            background: #FFFFFF;
            border-radius: 28px;
            padding: 2rem;
            border: 1px solid #efefe7;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
            margin-bottom: 2rem;
        }
        .artwork-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #efefe7;
            transition: all 0.3s ease;
            height: 100%;
        }
        .artwork-card:hover {
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            transform: translateY(-4px);
        }
        .artwork-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1rem;
        }
        .form-control, .form-select {
            border: 1.5px solid #e0e0d5;
            border-radius: 16px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background: #FFFFFF;
        }
        .form-control:focus, .form-select:focus {
            border-color: #e67300;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,115,0,0.1);
        }
        .btn-primary-custom {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
            transform: scale(1.02);
        }
        .btn-danger-custom {
            background-color: #dc3545;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .btn-danger-custom:hover {
            background-color: #c82333;
            transform: scale(1.02);
        }
        .btn-warning-custom {
            background-color: #ffc107;
            border: none;
            color: #111100;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            margin-right: 0.5rem;
        }
        .btn-warning-custom:hover {
            background-color: #e0a800;
            transform: scale(1.02);
        }
        .badge-status {
            background-color: #e67300;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-draft {
            background-color: #6c757d;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .modal-content-custom {
            border-radius: 28px;
            border: none;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #FFFFFF;
            border-radius: 28px;
            border: 2px dashed #e0e0d5;
        }
        .empty-state i {
            font-size: 4rem;
            color: #e67300;
            margin-bottom: 1rem;
        }
        .btn-logout {
            background-color: #e67300;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .artwork-card {
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        <div>
            <span class="me-3" style="color: #e67300; font-weight: 600;" id="artistName">Sarah Chen</span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="display-5 fw-bold mb-2">My Artwork Studio</h1>
                <p class="lead mb-0" style="opacity: 0.9;">Upload, edit, and manage your creative collection</p>
            </div>
            <button class="btn btn-light btn-lg rounded-pill px-4" id="showUploadFormBtn" style="color: #e67300; font-weight: 600;">
                <i class="bi bi-plus-lg"></i> Upload New
            </button>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row">
        <div class="col-lg-4 mb-4" id="uploadFormContainer" style="display: none;">
            <div class="form-card">
                <h3 class="fw-bold mb-4" style="color: #e67300;">
                    <i class="bi bi-cloud-upload"></i> Upload Artwork
                </h3>
                <form id="uploadArtworkForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Artwork Title *</label>
                        <input type="text" class="form-control" id="artTitle" required placeholder="e.g., Sunset Dreams">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category *</label>
                        <select class="form-select" id="artCategory" required>
                            <option value="">Select category</option>
                            <option value="Painting">🎨 Painting</option>
                            <option value="Sculpture">🗿 Sculpture</option>
                            <option value="Craft">🪢 Craft</option>
                            <option value="Digital Art">💻 Digital Art</option>
                            <option value="Photography">📷 Photography</option>
                            <option value="Jewelry">💎 Jewelry</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Price ($) *</label>
                        <input type="number" class="form-control" id="artPrice" required placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description *</label>
                        <textarea class="form-control" id="artDescription" rows="3" required placeholder="Describe your artwork..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Image URL *</label>
                        <input type="text" class="form-control" id="artImage" required placeholder="https://example.com/image.jpg">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-select" id="artStatus">
                            <option value="Published">Published (Visible to patrons)</option>
                            <option value="Draft">Draft (Only visible to you)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary-custom w-100">
                        <i class="bi bi-check-lg"></i> Upload Artwork
                    </button>
                    <button type="button" class="btn-outline-custom w-100 mt-2" id="cancelUploadBtn">
                        Cancel
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-12" id="artworksGridContainer">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold" style="color: #111100;">
                    <i class="bi bi-grid-3x3-gap-fill"></i> My Artworks
                </h2>
                <div>
                    <button class="btn-outline-custom btn-sm" id="filterAllBtn">All</button>
                    <button class="btn-outline-custom btn-sm" id="filterPublishedBtn">Published</button>
                    <button class="btn-outline-custom btn-sm" id="filterDraftBtn">Draft</button>
                </div>
            </div>
            <div class="row" id="artworksGrid"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Edit Artwork</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editArtworkForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text" class="form-control" id="editTitle">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <select class="form-select" id="editCategory">
                            <option value="Painting">Painting</option>
                            <option value="Sculpture">Sculpture</option>
                            <option value="Craft">Craft</option>
                            <option value="Digital Art">Digital Art</option>
                            <option value="Photography">Photography</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Price ($)</label>
                        <input type="number" class="form-control" id="editPrice">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control" id="editDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Image URL</label>
                        <input type="text" class="form-control" id="editImage">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-select" id="editStatus">
                            <option value="Published">Published</option>
                            <option value="Draft">Draft</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary-custom" id="saveEditBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let artworks = JSON.parse(localStorage.getItem('tb_artist_artworks')) || [
        {
            id: 1,
            title: 'Sunset Dreams',
            category: 'Painting',
            price: 450,
            description: 'Beautiful sunset over the ocean, acrylic on canvas.',
            image: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=400&h=300&fit=crop',
            status: 'Published',
            createdAt: '2024-03-15'
        },
        {
            id: 2,
            title: 'Bronze Warrior',
            category: 'Sculpture',
            price: 1200,
            description: 'Handcrafted bronze sculpture of a warrior.',
            image: 'https://images.unsplash.com/photo-1612196808214-b7e239e5b7d1?w=400&h=300&fit=crop',
            status: 'Published',
            createdAt: '2024-03-10'
        },
        {
            id: 3,
            title: 'Beaded Crown',
            category: 'Craft',
            price: 89,
            description: 'Traditional beaded crown with intricate patterns.',
            image: 'https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=400&h=300&fit=crop',
            status: 'Draft',
            createdAt: '2024-03-20'
        }
    ];
    
    let currentFilter = 'All';
    
    function saveArtworks() {
        localStorage.setItem('tb_artist_artworks', JSON.stringify(artworks));
    }
    
    function getNextId() {
        let maxId = 0;
        for(let i = 0; i < artworks.length; i++) {
            if(artworks[i].id > maxId) maxId = artworks[i].id;
        }
        return maxId + 1;
    }
    
    function renderArtworks() {
        let filtered = artworks;
        if(currentFilter === 'Published') {
            filtered = artworks.filter(function(a) { return a.status === 'Published'; });
        } else if(currentFilter === 'Draft') {
            filtered = artworks.filter(function(a) { return a.status === 'Draft'; });
        }
        
        if(filtered.length === 0) {
            $('#artworksGrid').html(`
                <div class="col-12">
                    <div class="empty-state">
                        <i class="bi bi-image"></i>
                        <h4 class="fw-bold">No artworks found</h4>
                        <p class="text-secondary">Click "Upload New" to add your first artwork</p>
                    </div>
                </div>
            `);
            return;
        }
        
        let html = '';
        for(let i = 0; i < filtered.length; i++) {
            let art = filtered[i];
            let statusBadge = art.status === 'Published' ? 
                '<span class="badge-status"><i class="bi bi-eye"></i> Published</span>' : 
                '<span class="badge-draft"><i class="bi bi-pencil"></i> Draft</span>';
            
            html += `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="artwork-card" data-id="${art.id}">
                        <img src="${art.image}" class="artwork-image" alt="${art.title}" onerror="this.src='https://placehold.co/600x400/e67300/white?text=Artwork'">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="fw-bold mb-0" style="color: #111100;">${art.title}</h5>
                            ${statusBadge}
                        </div>
                        <p class="text-secondary small mb-2">${art.category}</p>
                        <p class="fw-bold" style="color: #e67300; font-size: 1.3rem;">$${art.price}</p>
                        <p class="small text-secondary mb-3">${art.description.substring(0, 80)}${art.description.length > 80 ? '...' : ''}</p>
                        <div class="d-flex justify-content-between">
                            <button class="btn-warning-custom edit-btn" data-id="${art.id}">
                                <i class="bi bi-pencil"></i> Edit
                            </button>
                            <button class="btn-danger-custom delete-btn" data-id="${art.id}">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        $('#artworksGrid').html(html);
        
        $('.edit-btn').click(function() {
            let id = parseInt($(this).data('id'));
            let art = artworks.find(function(a) { return a.id === id; });
            if(art) {
                $('#editId').val(art.id);
                $('#editTitle').val(art.title);
                $('#editCategory').val(art.category);
                $('#editPrice').val(art.price);
                $('#editDescription').val(art.description);
                $('#editImage').val(art.image);
                $('#editStatus').val(art.status);
                $('#editModal').modal('show');
            }
        });
        
        $('.delete-btn').click(function() {
            let id = parseInt($(this).data('id'));
            if(confirm('Are you sure you want to delete this artwork?')) {
                let index = artworks.findIndex(function(a) { return a.id === id; });
                if(index !== -1) {
                    artworks.splice(index, 1);
                    saveArtworks();
                    renderArtworks();
                    alert('Artwork deleted successfully!');
                }
            }
        });
    }
    
    $('#uploadArtworkForm').submit(function(e) {
        e.preventDefault();
        let title = $('#artTitle').val();
        let category = $('#artCategory').val();
        let price = parseFloat($('#artPrice').val());
        let description = $('#artDescription').val();
        let image = $('#artImage').val();
        let status = $('#artStatus').val();
        
        if(title && category && price && description && image) {
            let newArtwork = {
                id: getNextId(),
                title: title,
                category: category,
                price: price,
                description: description,
                image: image,
                status: status,
                createdAt: new Date().toISOString().split('T')[0]
            };
            artworks.push(newArtwork);
            saveArtworks();
            $('#uploadArtworkForm')[0].reset();
            $('#uploadFormContainer').hide();
            $('#artworksGridContainer').removeClass('col-lg-8').addClass('col-lg-12');
            renderArtworks();
            alert('Artwork uploaded successfully!');
        } else {
            alert('Please fill all required fields');
        }
    });
    
    $('#saveEditBtn').click(function() {
        let id = parseInt($('#editId').val());
        let art = artworks.find(function(a) { return a.id === id; });
        if(art) {
            art.title = $('#editTitle').val();
            art.category = $('#editCategory').val();
            art.price = parseFloat($('#editPrice').val());
            art.description = $('#editDescription').val();
            art.image = $('#editImage').val();
            art.status = $('#editStatus').val();
            saveArtworks();
            renderArtworks();
            $('#editModal').modal('hide');
            alert('Artwork updated successfully!');
        }
    });
    
    $('#showUploadFormBtn').click(function() {
        $('#uploadFormContainer').toggle();
        if($('#uploadFormContainer').is(':visible')) {
            $('#artworksGridContainer').removeClass('col-lg-12').addClass('col-lg-8');
        } else {
            $('#artworksGridContainer').removeClass('col-lg-8').addClass('col-lg-12');
        }
    });
    
    $('#cancelUploadBtn').click(function() {
        $('#uploadFormContainer').hide();
        $('#artworksGridContainer').removeClass('col-lg-8').addClass('col-lg-12');
        $('#uploadArtworkForm')[0].reset();
    });
    
    $('#filterAllBtn').click(function() {
        currentFilter = 'All';
        renderArtworks();
    });
    
    $('#filterPublishedBtn').click(function() {
        currentFilter = 'Published';
        renderArtworks();
    });
    
    $('#filterDraftBtn').click(function() {
        currentFilter = 'Draft';
        renderArtworks();
    });
    
    $('#logoutBtn').click(function() {
        localStorage.removeItem('tb_user_type');
        localStorage.removeItem('tb_user_name');
        localStorage.removeItem('tb_artist_artworks');
        window.location.href = 'index.html';
    });
    
    let artistName = localStorage.getItem('tb_user_name');
    if(artistName) {
        $('#artistName').text(artistName);
    }
    
    renderArtworks();
</script>
</body>
</html>
