<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · Admin Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .sidebar {
            background-color: #FFFFFF;
            border-right: 1px solid #efefe7;
            min-height: calc(100vh - 80px);
            padding: 2rem 0;
        }
        .nav-item-custom {
            display: block;
            padding: 0.75rem 1.5rem;
            color: #111100;
            text-decoration: none;
            font-weight: 500;
            margin: 0.25rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-item-custom i {
            margin-right: 0.75rem;
            color: #e67300;
        }
        .nav-item-custom:hover {
            background-color: #fff4eb;
            color: #e67300;
        }
        .nav-item-custom.active {
            background-color: #fff4eb;
            color: #e67300;
            border-right: 3px solid #e67300;
        }
        .content-pane {
            padding: 2rem;
        }
        .dashboard-card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #efefe7;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }
        .dashboard-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #111100;
        }
        .stat-label {
            color: #6c6c5a;
            font-size: 0.9rem;
        }
        .table-custom {
            width: 100%;
        }
        .table-custom th {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid #efefe7;
            color: #111100;
            font-weight: 600;
            text-align: left;
        }
        .table-custom td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid #efefe7;
            color: #4a4a38;
            vertical-align: middle;
        }
        .badge-active {
            background-color: #28a745;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-suspended {
            background-color: #dc3545;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-pending {
            background-color: #ffc107;
            color: #111100;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-artist {
            background-color: #e67300;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-patron {
            background-color: #6f42c1;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-admin {
            background-color: #111100;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .btn-primary-custom {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
            transform: scale(1.02);
        }
        .btn-sm-suspend {
            background-color: transparent;
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-sm-suspend:hover {
            background-color: #dc3545;
            color: white;
            transform: scale(1.02);
        }
        .btn-sm-activate {
            background-color: transparent;
            border: 1px solid #28a745;
            color: #28a745;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-sm-activate:hover {
            background-color: #28a745;
            color: white;
            transform: scale(1.02);
        }
        .btn-sm-delete {
            background-color: transparent;
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-sm-delete:hover {
            background-color: #dc3545;
            color: white;
            transform: scale(1.02);
        }
        .btn-sm-view {
            background-color: transparent;
            border: 1px solid #e67300;
            color: #e67300;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-sm-view:hover {
            background-color: #e67300;
            color: white;
            transform: scale(1.02);
        }
        .btn-logout {
            background-color: #e67300;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .search-box {
            border: 1.5px solid #e0e0d5;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            width: 250px;
        }
        .search-box:focus {
            outline: none;
            border-color: #e67300;
        }
        .filter-select {
            border: 1.5px solid #e0e0d5;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            background: white;
        }
        .filter-select:focus {
            outline: none;
            border-color: #e67300;
        }
        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e67300, #cc6600);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }
        .modal-content-custom {
            border-radius: 24px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .dashboard-card {
            animation: fadeInUp 0.4s ease-out;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            background: #F9F9FB;
            border-radius: 16px;
        }
        .empty-state i {
            font-size: 3rem;
            color: #e0e0d5;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        <div>
            <span class="me-3" style="color: #e67300; font-weight: 600;" id="adminName">Admin</span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar">
            <a href="admin-dashboard.html" class="nav-item-custom">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="admin-manage-users.html" class="nav-item-custom active">
                <i class="bi bi-people"></i> Manage Users
            </a>
            <a href="admin-manage-artworks-orders.html" class="nav-item-custom">
                <i class="bi bi-grid-3x3-gap-fill"></i> Manage Artworks & Orders
            </a>
            <a href="#" class="nav-item-custom">
                <i class="bi bi-flag"></i> Reports
            </a>
            <a href="#" class="nav-item-custom">
                <i class="bi bi-gear"></i> Settings
            </a>
        </div>
        
        <div class="col-md-9 col-lg-10">
            <div class="content-pane">
                <div class="dashboard-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h3 class="fw-bold mb-0"><i class="bi bi-people"></i> Manage Users</h3>
                            <p class="text-secondary mb-0">View and manage all registered users</p>
                        </div>
                        <button class="btn-primary-custom" id="addUserBtn">
                            <i class="bi bi-person-plus"></i> Add New User
                        </button>
                    </div>
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number" id="totalUsers">0</div>
                                <div class="stat-label">Total Users</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number" id="totalArtists">0</div>
                                <div class="stat-label">Artists</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number" id="totalPatrons">0</div>
                                <div class="stat-label">Patrons</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number" id="suspendedUsers">0</div>
                                <div class="stat-label">Suspended</div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex flex-wrap gap-3 mb-4">
                        <input type="text" class="search-box" id="searchUser" placeholder="Search by name or email...">
                        <select class="filter-select" id="filterRole">
                            <option value="all">All Roles</option>
                            <option value="artist">Artists</option>
                            <option value="patron">Patrons</option>
                            <option value="admin">Admins</option>
                        </select>
                        <select class="filter-select" id="filterStatus">
                            <option value="all">All Status</option>
                            <option value="active">Active</option>
                            <option value="suspended">Suspended</option>
                            <option value="pending">Pending</option>
                        </select>
                        <button class="btn-outline-custom" id="clearFiltersBtn">
                            <i class="bi bi-x-circle"></i> Clear Filters
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table-custom" id="usersTable">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-person-plus"></i> Add New User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" id="newUserName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" id="newUserEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role</label>
                        <select class="form-control" id="newUserRole" required>
                            <option value="artist">Artist</option>
                            <option value="patron">Patron</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-control" id="newUserStatus" required>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="suspended">Suspended</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary-custom" id="saveUserBtn">Add User</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil"></i> Edit User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">
                    <input type="hidden" id="editUserId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" id="editUserName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" id="editUserEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role</label>
                        <select class="form-control" id="editUserRole" required>
                            <option value="artist">Artist</option>
                            <option value="patron">Patron</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-control" id="editUserStatus" required>
                            <option value="active">Active</option>
                            <option value="pending">Pending</option>
                            <option value="suspended">Suspended</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary-custom" id="updateUserBtn">Update User</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentUser = localStorage.getItem('tb_user_name');
    let userType = localStorage.getItem('tb_user_type');

    if(!currentUser || userType !== 'admin') {
        window.location.href = 'login.html';
    }

    document.getElementById('adminName').innerText = currentUser;

    let users = JSON.parse(localStorage.getItem('tb_admin_users')) || [
        {
            id: 1,
            name: 'Sarah Chen',
            email: 'sarah@artstudio.com',
            role: 'artist',
            status: 'active',
            joined: '2024-01-15'
        },
        {
            id: 2,
            name: 'James Wilson',
            email: 'james@collector.com',
            role: 'patron',
            status: 'active',
            joined: '2024-02-20'
        },
        {
            id: 3,
            name: 'David Okafor',
            email: 'david@digitalart.com',
            role: 'artist',
            status: 'active',
            joined: '2024-03-01'
        },
        {
            id: 4,
            name: 'Lisa Wong',
            email: 'lisa@artlover.com',
            role: 'patron',
            status: 'suspended',
            joined: '2024-03-15'
        },
        {
            id: 5,
            name: 'Amara Okonkwo',
            email: 'amara@crafts.com',
            role: 'artist',
            status: 'pending',
            joined: '2024-04-01'
        },
        {
            id: 6,
            name: 'Michael Brown',
            email: 'michael@business.com',
            role: 'patron',
            status: 'active',
            joined: '2024-04-10'
        },
        {
            id: 7,
            name: 'Admin User',
            email: 'admin@talentbridge.com',
            role: 'admin',
            status: 'active',
            joined: '2024-01-01'
        }
    ];

    let currentFilter = {
        search: '',
        role: 'all',
        status: 'all'
    };

    function saveUsers() {
        localStorage.setItem('tb_admin_users', JSON.stringify(users));
    }

    function getInitials(name) {
        return name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase();
    }

    function getRoleBadge(role) {
        if(role === 'artist') return '<span class="badge-artist"><i class="bi bi-brush"></i> Artist</span>';
        if(role === 'patron') return '<span class="badge-patron"><i class="bi bi-gem"></i> Patron</span>';
        if(role === 'admin') return '<span class="badge-admin"><i class="bi bi-shield"></i> Admin</span>';
        return '<span class="badge-active">' + role + '</span>';
    }

    function getStatusBadge(status) {
        if(status === 'active') return '<span class="badge-active"><i class="bi bi-check-circle"></i> Active</span>';
        if(status === 'suspended') return '<span class="badge-suspended"><i class="bi bi-x-circle"></i> Suspended</span>';
        if(status === 'pending') return '<span class="badge-pending"><i class="bi bi-clock"></i> Pending</span>';
        return '<span class="badge-active">' + status + '</span>';
    }

    function updateStats() {
        let totalUsers = users.length;
        let artists = users.filter(function(u) { return u.role === 'artist'; }).length;
        let patrons = users.filter(function(u) { return u.role === 'patron'; }).length;
        let suspended = users.filter(function(u) { return u.status === 'suspended'; }).length;
        
        document.getElementById('totalUsers').innerText = totalUsers;
        document.getElementById('totalArtists').innerText = artists;
        document.getElementById('totalPatrons').innerText = patrons;
        document.getElementById('suspendedUsers').innerText = suspended;
    }

    function renderUsers() {
        let filtered = users;
        
        if(currentFilter.search) {
            let search = currentFilter.search.toLowerCase();
            filtered = filtered.filter(function(u) {
                return u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search);
            });
        }
        
        if(currentFilter.role !== 'all') {
            filtered = filtered.filter(function(u) {
                return u.role === currentFilter.role;
            });
        }
        
        if(currentFilter.status !== 'all') {
            filtered = filtered.filter(function(u) {
                return u.status === currentFilter.status;
            });
        }

        let tbody = document.getElementById('usersTableBody');
        
        if(filtered.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="bi bi-people"></i>
                            <p class="text-secondary">No users found matching your filters</p>
                        </div>
                    </td>
                </tr>
            `;
            return;
        }

        let html = '';
        for(let i = 0; i < filtered.length; i++) {
            let user = filtered[i];
            let initials = getInitials(user.name);
            
            html += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="avatar-circle me-2">${initials}</div>
                            <div>
                                <div class="fw-semibold">${user.name}</div>
                            </div>
                        </div>
                    </td>
                    <td>${user.email}</td>
                    <td>${getRoleBadge(user.role)}</td>
                    <td>${getStatusBadge(user.status)}</td>
                    <td>${user.joined}</td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <button class="btn-sm-view edit-user" data-id="${user.id}">
                                <i class="bi bi-pencil"></i>
                            </button>
                            ${user.status === 'active' ? 
                                `<button class="btn-sm-suspend suspend-user" data-id="${user.id}">
                                    <i class="bi bi-pause-circle"></i>
                                </button>` :
                                user.status === 'suspended' ?
                                `<button class="btn-sm-activate activate-user" data-id="${user.id}">
                                    <i class="bi bi-play-circle"></i>
                                </button>` : ''
                            }
                            ${user.id !== 7 ? 
                                `<button class="btn-sm-delete delete-user" data-id="${user.id}">
                                    <i class="bi bi-trash"></i>
                                </button>` : ''
                            }
                        </div>
                    </td>
                </tr>
            `;
        }
        
        tbody.innerHTML = html;

        $('.edit-user').click(function() {
            let id = parseInt($(this).data('id'));
            let user = users.find(function(u) { return u.id === id; });
            if(user) {
                document.getElementById('editUserId').value = user.id;
                document.getElementById('editUserName').value = user.name;
                document.getElementById('editUserEmail').value = user.email;
                document.getElementById('editUserRole').value = user.role;
                document.getElementById('editUserStatus').value = user.status;
                $('#editUserModal').modal('show');
            }
        });

        $('.suspend-user').click(function() {
            let id = parseInt($(this).data('id'));
            if(confirm('Suspend this user? They will not be able to access their account.')) {
                let user = users.find(function(u) { return u.id === id; });
                if(user) {
                    user.status = 'suspended';
                    saveUsers();
                    updateStats();
                    renderUsers();
                    alert('User suspended successfully.');
                }
            }
        });

        $('.activate-user').click(function() {
            let id = parseInt($(this).data('id'));
            if(confirm('Activate this user? They will regain access to their account.')) {
                let user = users.find(function(u) { return u.id === id; });
                if(user) {
                    user.status = 'active';
                    saveUsers();
                    updateStats();
                    renderUsers();
                    alert('User activated successfully.');
                }
            }
        });

        $('.delete-user').click(function() {
            let id = parseInt($(this).data('id'));
            if(confirm('Delete this user? This action cannot be undone.')) {
                let index = users.findIndex(function(u) { return u.id === id; });
                if(index !== -1) {
                    users.splice(index, 1);
                    saveUsers();
                    updateStats();
                    renderUsers();
                    alert('User deleted successfully.');
                }
            }
        });
    }

    $('#addUserBtn').click(function() {
        $('#addUserModal').modal('show');
    });

    $('#saveUserBtn').click(function() {
        let name = document.getElementById('newUserName').value.trim();
        let email = document.getElementById('newUserEmail').value.trim();
        let role = document.getElementById('newUserRole').value;
        let status = document.getElementById('newUserStatus').value;
        
        if(name && email) {
            let newId = 1;
            for(let i = 0; i < users.length; i++) {
                if(users[i].id >= newId) newId = users[i].id + 1;
            }
            
            users.push({
                id: newId,
                name: name,
                email: email,
                role: role,
                status: status,
                joined: new Date().toISOString().split('T')[0]
            });
            
            saveUsers();
            updateStats();
            renderUsers();
            $('#addUserModal').modal('hide');
            document.getElementById('addUserForm').reset();
            alert('User added successfully!');
        } else {
            alert('Please fill in all required fields.');
        }
    });

    $('#updateUserBtn').click(function() {
        let id = parseInt(document.getElementById('editUserId').value);
        let name = document.getElementById('editUserName').value.trim();
        let email = document.getElementById('editUserEmail').value.trim();
        let role = document.getElementById('editUserRole').value;
        let status = document.getElementById('editUserStatus').value;
        
        if(name && email) {
            let user = users.find(function(u) { return u.id === id; });
            if(user) {
                user.name = name;
                user.email = email;
                user.role = role;
                user.status = status;
                saveUsers();
                updateStats();
                renderUsers();
                $('#editUserModal').modal('hide');
                alert('User updated successfully!');
            }
        } else {
            alert('Please fill in all required fields.');
        }
    });

    $('#searchUser').on('input', function() {
        currentFilter.search = $(this).val();
        renderUsers();
    });

    $('#filterRole').change(function() {
        currentFilter.role = $(this).val();
        renderUsers();
    });

    $('#filterStatus').change(function() {
        currentFilter.status = $(this).val();
        renderUsers();
    });

    $('#clearFiltersBtn').click(function() {
        $('#searchUser').val('');
        $('#filterRole').val('all');
        $('#filterStatus').val('all');
        currentFilter.search = '';
        currentFilter.role = 'all';
        currentFilter.status = 'all';
        renderUsers();
    });

    $('#logoutBtn').click(function() {
        localStorage.removeItem('tb_user_type');
        localStorage.removeItem('tb_user_name');
        localStorage.removeItem('tb_user_email');
        window.location.href = 'index.html';
    });

    updateStats();
    renderUsers();
</script>
</body>
</html>
