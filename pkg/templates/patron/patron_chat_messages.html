{% extends 'base.html' %}

{% block title %}TalentBridge · Patron Messages{% endblock %}

{% block extra_css %}
<style>
    body { height: 100vh; overflow: hidden; }
    .chat-container { display: flex; height: calc(100vh - 80px); background: #F9F9FB; }
    .conversations-sidebar { width: 350px; background: #FFFFFF; border-right: 1px solid #efefe7; display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #efefe7; background: #FFFFFF; position: sticky; top: 0; z-index: 10; }
    .search-box { background: #F9F9FB; border: 1px solid #e0e0d5; border-radius: 40px; padding: 0.6rem 1rem; width: 100%; font-size: 0.9rem; }
    .search-box:focus { outline: none; border-color: #e67300; }
    .conversation-item { display: flex; align-items: center; padding: 1rem 1.5rem; cursor: pointer; transition: all 0.3s ease; border-bottom: 1px solid #efefe7; }
    .conversation-item:hover { background-color: #fff4eb; }
    .conversation-item.active { background-color: #fff4eb; border-left: 3px solid #e67300; }
    .conversation-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #e67300, #cc6600); display: flex; align-items: center; justify-content: center; margin-right: 1rem; flex-shrink: 0; }
    .conversation-avatar i { font-size: 1.5rem; color: white; }
    .conversation-info { flex: 1; min-width: 0; }
    .conversation-name { font-weight: 700; margin-bottom: 0.25rem; }
    .conversation-last-msg { font-size: 0.8rem; color: #6c6c5a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conversation-time { font-size: 0.7rem; color: #6c6c5a; margin-left: 0.5rem; }
    .unread-badge { background-color: #e67300; color: white; border-radius: 40px; padding: 0.2rem 0.5rem; font-size: 0.7rem; font-weight: 700; margin-left: 0.5rem; }
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #F9F9FB; }
    .chat-header { background: #FFFFFF; padding: 1rem 1.5rem; border-bottom: 1px solid #efefe7; display: flex; align-items: center; }
    .chat-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #e67300, #cc6600); display: flex; align-items: center; justify-content: center; margin-right: 1rem; }
    .chat-avatar i { font-size: 1.3rem; color: white; }
    .chat-header-info h5 { margin-bottom: 0; font-weight: 700; }
    .chat-header-info p { margin-bottom: 0; font-size: 0.8rem; color: #6c6c5a; }
    .messages-container { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; }
    .message { max-width: 65%; margin-bottom: 1rem; display: flex; animation: fadeInUp 0.3s ease-out; }
    .message-sent { justify-content: flex-end; }
    .message-received { justify-content: flex-start; }
    .message-bubble { padding: 0.75rem 1rem; border-radius: 20px; word-wrap: break-word; }
    .message-sent .message-bubble { background: #e67300; color: white; border-bottom-right-radius: 4px; }
    .message-received .message-bubble { background: #FFFFFF; color: #111100; border: 1px solid #efefe7; border-bottom-left-radius: 4px; }
    .message-time { font-size: 0.7rem; margin-top: 0.25rem; color: #6c6c5a; }
    .message-sent .message-time { text-align: right; }
    .chat-input-area { background: #FFFFFF; padding: 1rem 1.5rem; border-top: 1px solid #efefe7; display: flex; gap: 0.75rem; }
    .chat-input { flex: 1; border: 1px solid #e0e0d5; border-radius: 40px; padding: 0.75rem 1rem; font-size: 0.9rem; resize: none; }
    .chat-input:focus { outline: none; border-color: #e67300; }
    .btn-send { background-color: #e67300; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; transition: all 0.3s ease; }
    .btn-send:hover { background-color: #cc6600; transform: scale(1.02); }
    .empty-chat { display: flex; align-items: center; justify-content: center; height: 100%; text-align: center; color: #6c6c5a; }
    .empty-chat i { font-size: 4rem; color: #e0e0d5; margin-bottom: 1rem; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e0e0d5; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #e67300; border-radius: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="conversations-sidebar">
        <div class="sidebar-header">
            <h5 class="fw-bold mb-3"><i class="bi bi-chat-dots"></i> Conversations</h5>
            <input type="text" class="search-box" placeholder="Search conversations..." id="searchConversation">
        </div>
        <div id="conversationsList"></div>
    </div>
    
    <div class="chat-area">
        <div id="chatContent"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        let currentUser = localStorage.getItem('tb_user_name');
        let userType = localStorage.getItem('tb_user_type');

        if(!currentUser || userType !== 'patron') {
            window.location.href = "{{ url_for('auth.register') }}";
        }

        let conversations = [];
        let currentConversationId = null;
        let searchTerm = '';

        function loadConversations() {
            $.ajax({
                url: "{{ url_for('user.patron_messages_data') }}",
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    conversations = data.conversations || [];
                    renderConversations();
                    loadDefaultChat();
                },
                error: function(err) {
                    console.error('Error loading conversations:', err);
                    conversations = [];
                    renderConversations();
                    loadDefaultChat();
                }
            });
        }

        function formatTime(timeString) {
            if(!timeString) return '';
            let date = new Date(timeString);
            let now = new Date();
            let today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            let msgDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            
            if(msgDate.getTime() === today.getTime()) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }

        function renderConversations() {
            let filtered = conversations;
            if(searchTerm) {
                filtered = conversations.filter(function(c) {
                    return c.artistName.toLowerCase().includes(searchTerm.toLowerCase());
                });
            }
            
            let html = '';
            for(let i = 0; i < filtered.length; i++) {
                let conv = filtered[i];
                let activeClass = (currentConversationId === conv.id) ? 'active' : '';
                let unreadBadge = conv.unreadCount > 0 ? '<span class="unread-badge">' + conv.unreadCount + '</span>' : '';
                
                html += `
                    <div class="conversation-item ${activeClass}" data-conv-id="${conv.id}">
                        <div class="conversation-avatar">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div class="conversation-info">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="conversation-name">${conv.artistName}</span>
                                <span class="conversation-time">${formatTime(conv.lastMessageTime)}</span>
                            </div>
                            <div class="conversation-last-msg">
                                ${conv.lastMessage ? conv.lastMessage.substring(0, 50) + (conv.lastMessage.length > 50 ? '...' : '') : 'No messages'}
                                ${unreadBadge}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            if(filtered.length === 0) {
                html = '<div class="text-center p-4 text-secondary">No conversations found</div>';
            }
            
            $('#conversationsList').html(html);
            
            $('.conversation-item').click(function() {
                let convId = parseInt($(this).data('conv-id'));
                openConversation(convId);
            });
        }

        function openConversation(convId) {
            let conversation = conversations.find(function(c) { return c.id === convId; });
            if(!conversation) return;
            
            currentConversationId = convId;
            
            if(conversation.unreadCount > 0) {
                for(let i = 0; i < conversation.messages.length; i++) {
                    if(conversation.messages[i].sender === 'artist' && !conversation.messages[i].read) {
                        conversation.messages[i].read = true;
                    }
                }
                conversation.unreadCount = 0;
                renderConversations();
            }
            
            let messagesHtml = '';
            for(let i = 0; i < conversation.messages.length; i++) {
                let msg = conversation.messages[i];
                let messageClass = msg.sender === 'patron' ? 'message-sent' : 'message-received';
                messagesHtml += `
                    <div class="message ${messageClass}">
                        <div>
                            <div class="message-bubble">${msg.text}</div>
                            <div class="message-time">${formatTime(msg.time)}</div>
                        </div>
                    </div>
                `;
            }
            
            let chatHtml = `
                <div class="chat-header">
                    <div class="chat-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <div class="chat-header-info">
                        <h5>${conversation.artistName}</h5>
                        <p><i class="bi bi-circle-fill" style="font-size: 0.5rem; color: #28a745;"></i> Online</p>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    ${messagesHtml}
                </div>
                <div class="chat-input-area">
                    <textarea class="chat-input" id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                    <button class="btn-send" id="sendMessageBtn"><i class="bi bi-send"></i></button>
                </div>
            `;
            
            $('#chatContent').html(chatHtml);
            
            let msgContainer = document.getElementById('messagesContainer');
            if(msgContainer) {
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }
            
            $('#messageInput').keypress(function(e) {
                if(e.which === 13 && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            $('#sendMessageBtn').click(function() {
                sendMessage();
            });
            
            function sendMessage() {
                let messageText = $('#messageInput').val().trim();
                if(!messageText) return;
                
                let conversation = conversations.find(function(c) { return c.id === convId; });
                if(conversation) {
                    $.ajax({
                        url: "{{ url_for('user.send_message') }}",
                        type: 'POST',
                        data: {
                            receiver_id: conversation.artistId,
                            receiver_type: 'artist',
                            message: messageText
                        },
                        dataType: 'json',
                        success: function(response) {
                            if(response.status === 'success') {
                                let newMessage = {
                                    id: conversation.messages.length + 1,
                                    sender: 'patron',
                                    text: messageText,
                                    time: new Date().toISOString(),
                                    read: true
                                };
                                conversation.messages.push(newMessage);
                                conversation.lastMessage = messageText;
                                conversation.lastMessageTime = new Date().toISOString();
                                $('#messageInput').val('');
                                openConversation(convId);
                            } else {
                                alert(response.message);
                            }
                        },
                        error: function() {
                            alert('An error occurred. Please try again.');
                        }
                    });
                }
            }
        }

        function loadDefaultChat() {
            if(conversations.length > 0 && !currentConversationId) {
                openConversation(conversations[0].id);
            } else if(conversations.length === 0) {
                $('#chatContent').html(`
                    <div class="empty-chat">
                        <div>
                            <i class="bi bi-chat-square-text"></i>
                            <h5>No conversations yet</h5>
                            <p>When you message artists, they'll appear here</p>
                        </div>
                    </div>
                `);
            }
        }

        $('#searchConversation').on('input', function() {
            searchTerm = $(this).val();
            renderConversations();
        });

        loadConversations();
    });
</script>
{% endblock %}
