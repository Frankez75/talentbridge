<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · Artist Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .sidebar {
            background-color: #FFFFFF;
            border-right: 1px solid #efefe7;
            min-height: calc(100vh - 80px);
            padding: 2rem 0;
        }
        .nav-item-custom {
            display: block;
            padding: 0.75rem 1.5rem;
            color: #111100;
            text-decoration: none;
            font-weight: 500;
            margin: 0.25rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
            border-right: 3px solid transparent;
        }
        .nav-item-custom i {
            margin-right: 0.75rem;
            color: #e67300;
        }
        .nav-item-custom:hover {
            background-color: #fff4eb;
            color: #e67300;
        }
        .nav-item-custom.active {
            background-color: #fff4eb;
            color: #e67300;
            border-right-color: #e67300;
        }
        .content-pane {
            padding: 2rem;
        }
        .dashboard-card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #efefe7;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }
        .dashboard-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #111100;
        }
        .stat-label {
            color: #6c6c5a;
            font-size: 0.9rem;
        }
        .btn-primary-custom {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
            transform: scale(1.02);
        }
        .btn-logout {
            background-color: #e67300;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .badge-pending {
            background-color: #ffc107;
            color: #111100;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-completed {
            background-color: #28a745;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-shipped {
            background-color: #6f42c1;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-active {
            background-color: #e67300;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .modal-content-custom {
            border-radius: 24px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .dashboard-card {
            animation: fadeInUp 0.4s ease-out;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            background: #F9F9FB;
            border-radius: 16px;
        }
        .empty-state i {
            font-size: 3rem;
            color: #e0e0d5;
            margin-bottom: 1rem;
        }
        .table-custom {
            width: 100%;
        }
        .table-custom th {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid #efefe7;
            color: #111100;
            font-weight: 600;
            text-align: left;
        }
        .table-custom td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid #efefe7;
            color: #4a4a38;
        }
        .order-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #efefe7;
        }
        .order-item:last-child {
            border-bottom: none;
        }
        .order-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 1rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        <div class="d-flex align-items-center gap-3">
            <span style="color: #e67300; font-weight: 600;" id="artistNameDisplay">Artist</span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar">
            <div class="nav-item-custom active" data-tab="overview">
                <i class="bi bi-speedometer2"></i> Overview
            </div>
            <div class="nav-item-custom" data-tab="artworks">
                <i class="bi bi-grid-3x3-gap-fill"></i> My Artworks
            </div>
            <div class="nav-item-custom" data-tab="upload">
                <i class="bi bi-cloud-upload"></i> Upload Artwork
            </div>
            <div class="nav-item-custom" data-tab="orders">
                <i class="bi bi-cart-check"></i> My Sales
            </div>
            <div class="nav-item-custom" data-tab="messages">
                <i class="bi bi-chat-dots"></i> Messages
            </div>
            <div class="nav-item-custom" data-tab="profile">
                <i class="bi bi-person-circle"></i> My Profile
            </div>
        </div>
        
        <div class="col-md-9 col-lg-10">
            <div class="content-pane" id="mainContent"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-cloud-upload"></i> Upload New Artwork</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text" class="form-control" id="artworkTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <select class="form-select" id="artworkCategory" required>
                            <option value="">Select category</option>
                            <option value="Painting">Painting</option>
                            <option value="Sculpture">Sculpture</option>
                            <option value="Craft">Craft</option>
                            <option value="Digital Art">Digital Art</option>
                            <option value="Photography">Photography</option>
                            <option value="Jewelry">Jewelry</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Price ($)</label>
                        <input type="number" class="form-control" id="artworkPrice" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control" id="artworkDescription" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Image URL</label>
                        <input type="text" class="form-control" id="artworkImage" placeholder="https://placehold.co/600x400" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary-custom" id="saveArtworkBtn">Upload Artwork</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function() {
        let currentUser = localStorage.getItem('tb_user_name');
        let userType = localStorage.getItem('tb_user_type');

        if(!currentUser || userType !== 'artist') {
            window.location.href = 'register.html';
            return;
        }

        $('#artistNameDisplay').text(currentUser);

        let artworks = JSON.parse(localStorage.getItem('tb_artist_artworks')) || [];
        let orders = JSON.parse(localStorage.getItem('tb_artist_orders')) || [
            { id: '#ORD-001', artwork: 'Sunset Dreams', buyer: 'James Wilson', amount: 450, status: 'completed', date: '2024-03-15' },
            { id: '#ORD-002', artwork: 'Bronze Warrior', buyer: 'Michael Brown', amount: 1200, status: 'pending', date: '2024-03-18' },
            { id: '#ORD-003', artwork: 'Beaded Crown', buyer: 'Lisa Wong', amount: 89, status: 'shipped', date: '2024-03-20' }
        ];

        let messages = [
            { from: 'James Wilson', message: 'Is this piece still available?', date: '2024-03-17', read: false },
            { from: 'Michael Brown', message: 'Can you do custom work?', date: '2024-03-19', read: true },
            { from: 'Lisa Wong', message: 'When will you ship?', date: '2024-03-21', read: false }
        ];

        function saveArtworks() {
            localStorage.setItem('tb_artist_artworks', JSON.stringify(artworks));
        }

        function renderOverview() {
            let totalArtworks = artworks.length;
            let totalSales = 0;
            let pendingOrders = 0;
            
            for(let i = 0; i < orders.length; i++) {
                if(orders[i].status === 'completed' || orders[i].status === 'delivered') {
                    totalSales += orders[i].amount;
                }
                if(orders[i].status === 'pending' || orders[i].status === 'processing') {
                    pendingOrders++;
                }
            }

            let recentOrdersHtml = '';
            for(let i = 0; i < Math.min(orders.length, 3); i++) {
                let order = orders[i];
                let statusClass = order.status === 'completed' ? 'badge-completed' : 
                                 order.status === 'shipped' ? 'badge-shipped' : 'badge-pending';
                recentOrdersHtml += `
                    <div class="order-item">
                        <div class="flex-grow-1">
                            <div class="fw-bold">${order.artwork}</div>
                            <div class="text-secondary small">${order.buyer}</div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold" style="color: #e67300;">$${order.amount}</div>
                            <span class="${statusClass}">${order.status}</span>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="dashboard-card">
                    <h3 class="fw-bold mb-4">Welcome back, ${currentUser}!</h3>
                    <p class="text-secondary mb-4">Your creative journey at a glance</p>
                    <div class="row g-4">
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number">${totalArtworks}</div>
                                <div class="stat-label">Total Artworks</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number">$${totalSales}</div>
                                <div class="stat-label">Total Revenue</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number">${pendingOrders}</div>
                                <div class="stat-label">Pending Orders</div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card text-center">
                                <div class="stat-number">${orders.length}</div>
                                <div class="stat-label">Total Orders</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="dashboard-card">
                    <h4 class="fw-bold mb-3">Recent Activity</h4>
                    ${recentOrdersHtml || '<p class="text-secondary">No recent orders</p>'}
                    ${orders.length > 3 ? '<div class="text-center mt-2"><a href="#" class="btn-outline-custom btn-sm" onclick="loadTab(\'orders\')">View All Orders</a></div>' : ''}
                </div>
            `;
        }

        function renderArtworks() {
            if(artworks.length === 0) {
                return `
                    <div class="dashboard-card">
                        <h3 class="fw-bold mb-4">My Artworks</h3>
                        <div class="empty-state">
                            <i class="bi bi-image"></i>
                            <h5 class="fw-bold">No artworks yet</h5>
                            <p class="text-secondary">Upload your first artwork to get started</p>
                            <button class="btn-primary-custom" onclick="loadTab('upload')">Upload Artwork</button>
                        </div>
                    </div>
                `;
            }

            let tableRows = '';
            for(let i = 0; i < artworks.length; i++) {
                tableRows += `
                    <tr>
                        <td><img src="${artworks[i].image}" width="60" height="60" style="object-fit:cover; border-radius:8px;" onerror="this.src='https://placehold.co/60x60/e67300/white?text=Art'"></td>
                        <td class="fw-bold">${artworks[i].title}</td>
                        <td>${artworks[i].category}</td>
                        <td><strong>$${artworks[i].price}</strong></td>
                        <td><span class="badge-active">Listed</span></td>
                        <td>
                            <button class="btn btn-sm btn-danger rounded-pill delete-artwork" data-index="${i}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }

            return `
                <div class="dashboard-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold mb-0">My Artworks</h3>
                        <button class="btn-primary-custom" onclick="loadTab('upload')">
                            <i class="bi bi-plus-lg"></i> Upload New
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderUpload() {
            return `
                <div class="dashboard-card">
                    <h3 class="fw-bold mb-4"><i class="bi bi-cloud-upload"></i> Upload New Artwork</h3>
                    <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#uploadModal">
                        <i class="bi bi-plus-lg"></i> Upload Artwork
                    </button>
                </div>
            `;
        }

        function renderOrders() {
            let tableRows = '';
            for(let i = 0; i < orders.length; i++) {
                let statusClass = orders[i].status === 'completed' ? 'badge-completed' : 
                                 orders[i].status === 'shipped' ? 'badge-shipped' : 'badge-pending';
                tableRows += `
                    <tr>
                        <td>${orders[i].id}</td>
                        <td>${orders[i].artwork}</td>
                        <td>${orders[i].buyer}</td>
                        <td><strong>$${orders[i].amount}</strong></td>
                        <td>${orders[i].date}</td>
                        <td><span class="${statusClass}">${orders[i].status}</span></td>
                        <td>
                            ${orders[i].status === 'pending' ? 
                                `<button class="btn btn-sm btn-warning rounded-pill update-order" data-order="${orders[i].id}">
                                    <i class="bi bi-pencil"></i> Update
                                </button>` : 
                                `<button class="btn btn-sm btn-outline-secondary rounded-pill">
                                    <i class="bi bi-check"></i> Done
                                </button>`
                            }
                        </td>
                    </tr>
                `;
            }

            return `
                <div class="dashboard-card">
                    <h3 class="fw-bold mb-4">My Sales</h3>
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Artwork</th>
                                    <th>Buyer</th>
                                    <th>Amount</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderMessages() {
            let messageHtml = `
                <div class="dashboard-card">
                    <h3 class="fw-bold mb-4"><i class="bi bi-chat-dots"></i> Messages</h3>
            `;

            if(messages.length === 0) {
                messageHtml += `
                    <div class="empty-state">
                        <i class="bi bi-chat-square-text"></i>
                        <h5 class="fw-bold">No messages</h5>
                        <p class="text-secondary">Messages from patrons will appear here</p>
                    </div>
                `;
            } else {
                for(let i = 0; i < messages.length; i++) {
                    let msg = messages[i];
                    let unreadClass = !msg.read ? 'border-left: 3px solid #e67300;' : '';
                    messageHtml += `
                        <div class="dashboard-card" style="margin-bottom: 0.75rem; ${unreadClass} cursor: pointer;" onclick="alert('Open conversation with ${msg.from}')">
                            <div class="d-flex justify-content-between">
                                <strong style="color: #e67300;">${msg.from}</strong>
                                <small class="text-secondary">${msg.date}</small>
                            </div>
                            <p class="mt-2 mb-1">${msg.message}</p>
                            ${!msg.read ? '<span class="badge-active" style="font-size: 0.7rem;">New</span>' : ''}
                        </div>
                    `;
                }
            }

            messageHtml += '</div>';
            return messageHtml;
        }

        function renderProfile() {
            return `
                <div class="dashboard-card">
                    <h3 class="fw-bold mb-4"><i class="bi bi-person-circle"></i> My Profile</h3>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Display Name</label>
                            <input type="text" class="form-control" id="profileName" value="${currentUser}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" id="profileEmail" value="${localStorage.getItem('tb_user_email') || 'artist@example.com'}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Bio</label>
                            <textarea class="form-control" id="profileBio" rows="3">Passionate artist creating unique pieces.</textarea>
                        </div>
                        <button type="submit" class="btn-primary-custom">Save Changes</button>
                    </form>
                </div>
            `;
        }

        window.loadTab = function(tabName) {
            let content = '';
            switch(tabName) {
                case 'overview': content = renderOverview(); break;
                case 'artworks': content = renderArtworks(); break;
                case 'upload': content = renderUpload(); break;
                case 'orders': content = renderOrders(); break;
                case 'messages': content = renderMessages(); break;
                case 'profile': content = renderProfile(); break;
                default: content = renderOverview();
            }
            $('#mainContent').html(content);

            $('.nav-item-custom').removeClass('active');
            $(`.nav-item-custom[data-tab="${tabName}"]`).addClass('active');

            if(tabName === 'artworks') {
                $('.delete-artwork').click(function() {
                    let index = $(this).data('index');
                    if(confirm('Delete this artwork?')) {
                        artworks.splice(index, 1);
                        saveArtworks();
                        loadTab('artworks');
                    }
                });
            }

            if(tabName === 'orders') {
                $('.update-order').click(function() {
                    let orderId = $(this).data('order');
                    let order = orders.find(function(o) { return o.id === orderId; });
                    if(order) {
                        let statuses = ['pending', 'processing', 'shipped', 'delivered', 'completed'];
                        let currentIndex = statuses.indexOf(order.status);
                        let nextStatus = statuses[currentIndex + 1];
                        if(nextStatus) {
                            order.status = nextStatus;
                            if(nextStatus === 'shipped') {
                                alert('Order marked as shipped!');
                            } else if(nextStatus === 'delivered') {
                                alert('Order marked as delivered!');
                            } else if(nextStatus === 'completed') {
                                alert('Order completed!');
                            }
                            localStorage.setItem('tb_artist_orders', JSON.stringify(orders));
                            loadTab('orders');
                        }
                    }
                });
            }

            if(tabName === 'profile') {
                $('#profileForm').submit(function(e) {
                    e.preventDefault();
                    let newName = $('#profileName').val();
                    localStorage.setItem('tb_user_name', newName);
                    $('#artistNameDisplay').text(newName);
                    currentUser = newName;
                    alert('Profile updated successfully!');
                });
            }
        };

        $('.nav-item-custom').click(function() {
            let tab = $(this).data('tab');
            loadTab(tab);
        });

        $('#saveArtworkBtn').click(function() {
            let title = $('#artworkTitle').val();
            let category = $('#artworkCategory').val();
            let price = $('#artworkPrice').val();
            let description = $('#artworkDescription').val();
            let image = $('#artworkImage').val();

            if(title && category && price && description && image) {
                artworks.push({
                    title: title,
                    category: category,
                    price: price,
                    description: description,
                    image: image
                });
                saveArtworks();
                $('#uploadModal').modal('hide');
                $('#uploadForm')[0].reset();
                alert('Artwork uploaded successfully!');
                loadTab('artworks');
            } else {
                alert('Please fill all fields');
            }
        });

        $('#logoutBtn').click(function() {
            localStorage.removeItem('tb_user_type');
            localStorage.removeItem('tb_user_name');
            localStorage.removeItem('tb_user_email');
            window.location.href = 'index.html';
        });

        loadTab('overview');
    });
</script>
</body>
</html>
