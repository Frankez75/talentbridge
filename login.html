<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    ‎<meta name= "author"  content= "TalentBridge"
‎<meta name="description" content="A platforms for the talents that just need an opportunity">
    <title>TalentBridge · Login</title>
 <link rel="stylesheet" href="bootstrap/css/bootstrap.css">

<link rel="stylesheet" href="fontawesome/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .login-card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 12px 30px rgba(17, 17, 0, 0.06);
            border: 1px solid #efefe7;
        }
        .form-control {
            border: 1.5px solid #e0e0d5;
            border-radius: 16px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background: #FFFFFF;
        }
        .form-control:focus {
            border-color: #e67300;
            outline: none;
            box-shadow: none;
        }
        .btn-login {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.85rem;
            border-radius: 40px;
            font-size: 1rem;
            width: 100%;
        }
        .btn-login:hover {
            background-color: #cc6600;
            color: white;
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
        }
        .text-accent {
            color: #e67300;
        }
        a {
            text-decoration: none;
        }
    </style>
    
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        </div>
    </nav>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
        <div class="col-md-5 col-lg-4">
            <div class="login-card">
                <h2 class="fw-bold mb-2" style="color: #111100;">Welcome back</h2>
                <p class="text-secondary mb-4">Sign in to continue your creative journey</p>
                <form id="loginForm" action="index.html" method="GET">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email address</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn-login mb-3">Sign in</button>
                </form>
                <div class="text-center mt-3">
                    <span class="text-secondary">Don't have an account? </span>
                    <a href="register.html" class="text-accent fw-semibold">Create account</a>
                </div>
                <div class="text-center mt-3">
                    <a href="index.html" class="btn-outline-custom d-inline-block" style="font-size: 0.85rem;">← Back to home</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
