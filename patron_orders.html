<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · My Orders & Purchases</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .page-header {
            background: linear-gradient(135deg, #111100 0%, #2a2a1a 100%);
            color: white;
            padding: 2.5rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 32px 32px;
        }
        .stat-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid #efefe7;
            transition: all 0.3s ease;
            height: 100%;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #e67300;
        }
        .stat-label {
            color: #6c6c5a;
            font-size: 0.85rem;
        }
        .order-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #efefe7;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .order-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        .order-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
        }
        .badge-pending {
            background-color: #ffc107;
            color: #111100;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-processing {
            background-color: #17a2b8;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-shipped {
            background-color: #6f42c1;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-delivered {
            background-color: #28a745;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-completed {
            background-color: #e67300;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .badge-cancelled {
            background-color: #dc3545;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .btn-primary-custom {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            transition: all 0.3s ease;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
            transform: scale(1.02);
        }
        .btn-sm-track {
            background-color: transparent;
            border: 1.5px solid #e67300;
            color: #e67300;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-sm-track:hover {
            background-color: #e67300;
            color: white;
            transform: scale(1.02);
        }
        .btn-sm-review {
            background-color: #111100;
            color: white;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-sm-review:hover {
            background-color: #2a2a1a;
            transform: scale(1.02);
        }
        .btn-logout {
            background-color: #e67300;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background-color: #cc6600;
            transform: scale(1.02);
        }
        .section-tabs {
            border-bottom: 2px solid #efefe7;
            margin-bottom: 2rem;
        }
        .section-tab {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            color: #6c6c5a;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s ease;
        }
        .section-tab:hover {
            color: #e67300;
        }
        .section-tab.active {
            color: #e67300;
            border-bottom-color: #e67300;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #FFFFFF;
            border-radius: 20px;
            border: 2px dashed #e0e0d5;
        }
        .empty-state i {
            font-size: 4rem;
            color: #e67300;
            margin-bottom: 1rem;
        }
        .modal-content-custom {
            border-radius: 24px;
        }
        .rating-stars {
            color: #ffc107;
            font-size: 1.5rem;
            letter-spacing: 4px;
            cursor: pointer;
        }
        .rating-stars i {
            transition: all 0.3s ease;
        }
        .rating-stars i:hover {
            transform: scale(1.2);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .order-card {
            animation: fadeInUp 0.4s ease-out;
        }
        footer {
            background: #FFFFFF;
            padding: 2rem 0;
            border-top: 1px solid #efefe7;
            margin-top: 3rem;
        }
        .timeline {
            position: relative;
            padding-left: 2rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e0e0d5;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding-left: 0.5rem;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 0.3rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e67300;
            border: 2px solid white;
        }
        .timeline-item.completed::before {
            background: #28a745;
        }
        .timeline-item.pending::before {
            background: #e0e0d5;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        <div>
            <span class="me-3" style="color: #e67300; font-weight: 600;" id="userNameDisplay">Patron</span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="display-5 fw-bold mb-2">My Orders & Purchases</h1>
                <p class="lead mb-0" style="opacity: 0.9;">Track and manage all your art purchases</p>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number" id="totalOrdersCount">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number" id="deliveredCount">0</div>
                <div class="stat-label">Delivered</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number" id="totalSpent">$0</div>
                <div class="stat-label">Total Spent</div>
            </div>
        </div>
    </div>

    <div class="section-tabs">
        <div class="section-tab active" data-tab="active">
            <i class="bi bi-clock-history"></i> Active Orders
        </div>
        <div class="section-tab" data-tab="completed">
            <i class="bi bi-check-circle"></i> Completed
        </div>
        <div class="section-tab" data-tab="all">
            <i class="bi bi-list-ul"></i> All Orders
        </div>
    </div>

    <div id="ordersContainer"></div>
</div>

<div class="modal fade" id="trackModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-geo-alt"></i> Track Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p><strong>Order ID:</strong> <span id="trackOrderId"></span></p>
                <p><strong>Artwork:</strong> <span id="trackArtworkTitle"></span></p>
                <p><strong>Artist:</strong> <span id="trackArtistName"></span></p>
                <hr>
                <div class="timeline" id="trackTimeline"></div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-primary-custom" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-star"></i> Write a Review</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p><strong>Artwork:</strong> <span id="reviewArtworkTitle"></span></p>
                <p><strong>Artist:</strong> <span id="reviewArtistName"></span></p>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Rating</label>
                    <div class="rating-stars" id="ratingStars">
                        <i class="bi bi-star" data-rating="1"></i>
                        <i class="bi bi-star" data-rating="2"></i>
                        <i class="bi bi-star" data-rating="3"></i>
                        <i class="bi bi-star" data-rating="4"></i>
                        <i class="bi bi-star" data-rating="5"></i>
                    </div>
                    <input type="hidden" id="selectedRating" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Comment</label>
                    <textarea class="form-control" id="reviewComment" rows="3" placeholder="Share your experience..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary-custom" id="submitReviewBtn">Submit Review</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container text-center">
        <p class="text-secondary">&copy; 2025 TalentBridge. Your art collection journey.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentUser = localStorage.getItem('tb_user_name');
    let userType = localStorage.getItem('tb_user_type');

    if(!currentUser || userType !== 'patron') {
        window.location.href = 'register.html';
    }

    document.getElementById('userNameDisplay').innerText = currentUser;

    let orders = JSON.parse(localStorage.getItem('tb_patron_orders')) || [
        {
            id: 'ORD-1001',
            artworkId: 101,
            artworkTitle: 'Sunset Dreams',
            artistName: 'Sarah Chen',
            artistId: 101,
            image: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=200&h=200&fit=crop',
            amount: 450,
            status: 'Delivered',
            orderDate: '2024-06-10',
            processingDate: '2024-06-11',
            shippedDate: '2024-06-12',
            deliveredDate: '2024-06-14',
            trackingNumber: 'TRK789456123',
            reviewed: false
        },
        {
            id: 'ORD-1002',
            artworkId: 102,
            artworkTitle: 'Bronze Warrior',
            artistName: 'Sarah Chen',
            artistId: 101,
            image: 'https://images.unsplash.com/photo-1612196808214-b7e239e5b7d1?w=200&h=200&fit=crop',
            amount: 1200,
            status: 'Shipped',
            orderDate: '2024-06-08',
            processingDate: '2024-06-09',
            shippedDate: '2024-06-11',
            deliveredDate: null,
            trackingNumber: 'TRK456789123',
            reviewed: false
        },
        {
            id: 'ORD-1003',
            artworkId: 103,
            artworkTitle: 'Ethereal Forest',
            artistName: 'David Okafor',
            artistId: 102,
            image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=200&h=200&fit=crop',
            amount: 680,
            status: 'Processing',
            orderDate: '2024-06-12',
            processingDate: '2024-06-13',
            shippedDate: null,
            deliveredDate: null,
            trackingNumber: null,
            reviewed: false
        },
        {
            id: 'ORD-1004',
            artworkId: 104,
            artworkTitle: 'Abstract No. 7',
            artistName: 'David Okafor',
            artistId: 102,
            image: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=200&h=200&fit=crop',
            amount: 320,
            status: 'Delivered',
            orderDate: '2024-06-01',
            processingDate: '2024-06-02',
            shippedDate: '2024-06-03',
            deliveredDate: '2024-06-06',
            trackingNumber: 'TRK123456789',
            reviewed: true
        },
        {
            id: 'ORD-1005',
            artworkId: 105,
            artworkTitle: 'Beaded Crown',
            artistName: 'Amara Okonkwo',
            artistId: 103,
            image: 'https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=200&h=200&fit=crop',
            amount: 89,
            status: 'Completed',
            orderDate: '2024-05-28',
            processingDate: '2024-05-29',
            shippedDate: '2024-05-30',
            deliveredDate: '2024-06-02',
            trackingNumber: 'TRK987654321',
            reviewed: false
        },
        {
            id: 'ORD-1006',
            artworkId: 106,
            artworkTitle: 'Urban Rhythms',
            artistName: 'James Wilson',
            artistId: 104,
            image: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=200&h=200&fit=crop',
            amount: 250,
            status: 'Pending',
            orderDate: '2024-06-15',
            processingDate: null,
            shippedDate: null,
            deliveredDate: null,
            trackingNumber: null,
            reviewed: false
        }
    ];

    let currentTab = 'active';

    function saveOrders() {
        localStorage.setItem('tb_patron_orders', JSON.stringify(orders));
    }

    function updateStatistics() {
        let totalOrders = orders.length;
        let pending = orders.filter(function(o) { return o.status === 'Pending' || o.status === 'Processing'; }).length;
        let delivered = orders.filter(function(o) { return o.status === 'Delivered' || o.status === 'Completed'; }).length;
        let totalSpent = 0;
        for(let i = 0; i < orders.length; i++) {
            if(orders[i].status !== 'Cancelled') {
                totalSpent += orders[i].amount;
            }
        }
        
        document.getElementById('totalOrdersCount').innerText = totalOrders;
        document.getElementById('pendingCount').innerText = pending;
        document.getElementById('deliveredCount').innerText = delivered;
        document.getElementById('totalSpent').innerText = '$' + totalSpent.toLocaleString();
    }

    function getStatusBadge(status) {
        let badgeClass = '';
        if(status === 'Pending') badgeClass = 'badge-pending';
        else if(status === 'Processing') badgeClass = 'badge-processing';
        else if(status === 'Shipped') badgeClass = 'badge-shipped';
        else if(status === 'Delivered') badgeClass = 'badge-delivered';
        else if(status === 'Completed') badgeClass = 'badge-completed';
        else if(status === 'Cancelled') badgeClass = 'badge-cancelled';
        else badgeClass = 'badge-pending';
        
        return '<span class="' + badgeClass + '"><i class="bi bi-info-circle"></i> ' + status + '</span>';
    }

    function renderOrders() {
        let filteredOrders = [];
        if(currentTab === 'active') {
            filteredOrders = orders.filter(function(o) { return o.status === 'Pending' || o.status === 'Processing' || o.status === 'Shipped'; });
        } else if(currentTab === 'completed') {
            filteredOrders = orders.filter(function(o) { return o.status === 'Delivered' || o.status === 'Completed'; });
        } else {
            filteredOrders = orders;
        }

        filteredOrders.sort(function(a, b) {
            return new Date(b.orderDate) - new Date(a.orderDate);
        });
        
        if(filteredOrders.length === 0) {
            document.getElementById('ordersContainer').innerHTML = `
                <div class="empty-state">
                    <i class="bi bi-box"></i>
                    <h4 class="fw-bold">No orders found</h4>
                    <p class="text-secondary">Start exploring and purchase your favorite artworks</p>
                    <a href="browse-search-artists.html" class="btn-primary-custom">Browse Artworks</a>
                </div>
            `;
            return;
        }
        
        let html = '';
        for(let i = 0; i < filteredOrders.length; i++) {
            let order = filteredOrders[i];
            let showReview = (order.status === 'Delivered' || order.status === 'Completed') && !order.reviewed;
            
            html += `
                <div class="order-card">
                    <div class="row align-items-center">
                        <div class="col-md-2">
                            <img src="${order.image}" class="order-image" alt="${order.artworkTitle}" onerror="this.src='https://placehold.co/200x200/e67300/white?text=Art'">
                        </div>
                        <div class="col-md-3">
                            <h6 class="fw-bold mb-1">${order.artworkTitle}</h6>
                            <div class="text-secondary small"><i class="bi bi-person"></i> ${order.artistName}</div>
                            <div class="text-secondary small">Order #${order.id}</div>
                        </div>
                        <div class="col-md-2">
                            <div class="fw-bold" style="color: #e67300;">$${order.amount}</div>
                            <small class="text-secondary">${order.orderDate}</small>
                        </div>
                        <div class="col-md-2">
                            ${getStatusBadge(order.status)}
                        </div>
                        <div class="col-md-3">
                            <div class="d-flex gap-2 flex-wrap">
                                <button class="btn-sm-track track-order" data-order-id="${order.id}">
                                    <i class="bi bi-geo-alt"></i> Track
                                </button>
                                ${showReview ? 
                                    `<button class="btn-sm-review review-order" data-order-id="${order.id}">
                                        <i class="bi bi-star"></i> Review
                                    </button>` : ''
                                }
                                ${order.status === 'Pending' ? 
                                    `<button class="btn-sm-track cancel-order" data-order-id="${order.id}" style="border-color: #dc3545; color: #dc3545;">
                                        <i class="bi bi-x-circle"></i> Cancel
                                    </button>` : ''
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        document.getElementById('ordersContainer').innerHTML = html;

        $('.track-order').click(function() {
            let orderId = $(this).data('order-id');
            let order = orders.find(function(o) { return o.id === orderId; });
            if(order) {
                document.getElementById('trackOrderId').innerText = order.id;
                document.getElementById('trackArtworkTitle').innerText = order.artworkTitle;
                document.getElementById('trackArtistName').innerText = order.artistName;
                
                let timelineHtml = '';
                let steps = [
                    { label: 'Order Placed', date: order.orderDate, completed: true },
                    { label: 'Processing', date: order.processingDate, completed: !!order.processingDate },
                    { label: 'Shipped', date: order.shippedDate, completed: !!order.shippedDate },
                    { label: 'Delivered', date: order.deliveredDate, completed: !!order.deliveredDate }
                ];
                
                for(let s = 0; s < steps.length; s++) {
                    let step = steps[s];
                    let className = step.completed ? 'timeline-item completed' : 'timeline-item pending';
                    timelineHtml += `
                        <div class="${className}">
                            <div class="fw-bold">${step.label}</div>
                            <small class="text-secondary">${step.date || 'Not yet'}</small>
                        </div>
                    `;
                }
                
                document.getElementById('trackTimeline').innerHTML = timelineHtml;
                $('#trackModal').modal('show');
            }
        });

        $('.review-order').click(function() {
            let orderId = $(this).data('order-id');
            let order = orders.find(function(o) { return o.id === orderId; });
            if(order) {
                document.getElementById('reviewArtworkTitle').innerText = order.artworkTitle;
                document.getElementById('reviewArtistName').innerText = order.artistName;
                document.getElementById('selectedRating').value = 0;
                document.getElementById('reviewComment').value = '';
                
                let stars = document.querySelectorAll('#ratingStars i');
                stars.forEach(function(star) {
                    star.classList.remove('bi-star-fill');
                    star.classList.add('bi-star');
                });
                
                $('#reviewModal').modal('show');
                
                $('#submitReviewBtn').off('click').on('click', function() {
                    let rating = parseInt(document.getElementById('selectedRating').value);
                    let comment = document.getElementById('reviewComment').value.trim();
                    
                    if(rating === 0) {
                        alert('Please select a rating.');
                        return;
                    }
                    
                    if(!comment) {
                        alert('Please write a review comment.');
                        return;
                    }
                    
                    order.reviewed = true;
                    saveOrders();
                    $('#reviewModal').modal('hide');
                    renderOrders();
                    alert('Thank you for your review! Rating: ' + rating + ' stars');
                });
            }
        });

        $('.cancel-order').click(function() {
            let orderId = $(this).data('order-id');
            if(confirm('Are you sure you want to cancel this order?')) {
                let order = orders.find(function(o) { return o.id === orderId; });
                if(order) {
                    order.status = 'Cancelled';
                    saveOrders();
                    updateStatistics();
                    renderOrders();
                    alert('Order cancelled successfully.');
                }
            }
        });
    }

    $('.section-tab').click(function() {
        $('.section-tab').removeClass('active');
        $(this).addClass('active');
        currentTab = $(this).data('tab');
        renderOrders();
    });

    let stars = document.querySelectorAll('#ratingStars i');
    stars.forEach(function(star) {
        star.addEventListener('click', function() {
            let rating = parseInt(this.getAttribute('data-rating'));
            document.getElementById('selectedRating').value = rating;
            
            stars.forEach(function(s) {
                let starRating = parseInt(s.getAttribute('data-rating'));
                if(starRating <= rating) {
                    s.classList.remove('bi-star');
                    s.classList.add('bi-star-fill');
                } else {
                    s.classList.remove('bi-star-fill');
                    s.classList.add('bi-star');
                }
            });
        });
        
        star.addEventListener('mouseenter', function() {
            let rating = parseInt(this.getAttribute('data-rating'));
            stars.forEach(function(s) {
                let starRating = parseInt(s.getAttribute('data-rating'));
                if(starRating <= rating) {
                    s.classList.remove('bi-star');
                    s.classList.add('bi-star-fill');
                } else {
                    s.classList.remove('bi-star-fill');
                    s.classList.add('bi-star');
                }
            });
        });
        
        star.addEventListener('mouseleave', function() {
            let selected = parseInt(document.getElementById('selectedRating').value);
            stars.forEach(function(s) {
                let starRating = parseInt(s.getAttribute('data-rating'));
                if(starRating <= selected) {
                    s.classList.remove('bi-star');
                    s.classList.add('bi-star-fill');
                } else {
                    s.classList.remove('bi-star-fill');
                    s.classList.add('bi-star');
                }
            });
        });
    });

    $('#logoutBtn').click(function() {
        localStorage.removeItem('tb_user_type');
        localStorage.removeItem('tb_user_name');
        localStorage.removeItem('tb_user_email');
        window.location.href = 'index.html';
    });

    updateStatistics();
    renderOrders();
</script>
</body>
</html>
