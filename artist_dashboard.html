<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · Artist Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .sidebar {
            background-color: #FFFFFF;
            border-right: 1px solid #efefe7;
            min-height: calc(100vh - 80px);
            padding: 2rem 0;
        }
        .nav-item-custom {
            display: block;
            padding: 0.75rem 1.5rem;
            color: #111100;
            text-decoration: none;
            font-weight: 500;
            margin: 0.25rem 0;
            cursor: pointer;
        }
        .nav-item-custom i {
            margin-right: 0.75rem;
            color: #e67300;
        }
        .nav-item-custom:hover {
            background-color: #fff4eb;
            color: #e67300;
        }
        .nav-item-custom.active {
            background-color: #fff4eb;
            color: #e67300;
            border-right: 3px solid #e67300;
        }
        .dashboard-card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #efefe7;
            margin-bottom: 1.5rem;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #111100;
        }
        .stat-label {
            color: #6c6c5a;
            font-size: 0.85rem;
        }
        .table-custom {
            width: 100%;
        }
        .table-custom th {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid #efefe7;
            color: #111100;
            font-weight: 600;
            text-align: left;
        }
        .table-custom td {
            padding: 1rem 0.75rem;
            border-bottom: 1px solid #efefe7;
            color: #4a4a38;
        }
        .badge-active {
            background-color: #e67300;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-pending {
            background-color: #e0e0d5;
            color: #111100;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-shipped {
            background-color: #111100;
            color: #FFFFFF;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .btn-primary-custom {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
        }
        .btn-primary-custom:hover {
            background-color: #cc6600;
            color: white;
        }
        .btn-sm-danger {
            background-color: transparent;
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
        }
        .btn-sm-danger:hover {
            background-color: #dc3545;
            color: white;
        }
        .btn-sm-warning {
            background-color: transparent;
            border: 1px solid #e67300;
            color: #e67300;
            padding: 0.25rem 0.75rem;
            border-radius: 40px;
            font-size: 0.75rem;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
        }
        .btn-sm-warning:hover {
            background-color: #e67300;
            color: white;
        }
        .content-pane {
            padding: 2rem;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 17, 0, 0.5);
            z-index: 1000;
        }
        .modal-content {
            background-color: #FFFFFF;
            border-radius: 32px;
            max-width: 500px;
            margin: 100px auto;
            padding: 2rem;
            position: relative;
        }
        .form-control {
            border: 1.5px solid #e0e0d5;
            border-radius: 16px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background: #FFFFFF;
            width: 100%;
        }
        .form-control:focus {
            border-color: #e67300;
            outline: none;
        }
        .btn-close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6c6c5a;
        }
        .btn-logout {
            background-color: #e67300;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-logout:hover {
            background-color: #cc6600;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
            <div>
                <span class="me-3" style="color: #e67300; font-weight: 600;" id="artistNameDisplay">Artist Name</span>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar">
                <div class="nav-item-custom active" data-tab="overview">
                    <i class="bi bi-speedometer2"></i> Overview
                </div>
                <div class="nav-item-custom" data-tab="artworks">
                    <i class="bi bi-grid-3x3-gap-fill"></i> My Artworks
                </div>
                <div class="nav-item-custom" data-tab="upload">
                    <i class="bi bi-cloud-upload"></i> Upload Artwork
                </div>
                <div class="nav-item-custom" data-tab="orders">
                    <i class="bi bi-cart-check"></i> My Sales
                </div>
                <div class="nav-item-custom" data-tab="messages">
                    <i class="bi bi-chat-dots"></i> Messages
                </div>
                <div class="nav-item-custom" data-tab="profile">
                    <i class="bi bi-person-circle"></i> My Profile
                </div>
            </div>
            
            <div class="col-md-9 col-lg-10">
                <div class="content-pane" id="mainContent"></div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content">
            <div class="btn-close-modal" id="closeModalBtn">&times;</div>
            <h3 class="fw-bold mb-4">Upload New Artwork</h3>
            <form id="uploadForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" class="form-control" id="artworkTitle" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    <select class="form-control" id="artworkCategory" required>
                        <option value="">Select category</option>
                        <option value="Painting">Painting</option>
                        <option value="Sculpture">Sculpture</option>
                        <option value="Craft">Craft</option>
                        <option value="Digital Art">Digital Art</option>
                        <option value="Photography">Photography</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Price ($)</label>
                    <input type="number" class="form-control" id="artworkPrice" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea class="form-control" id="artworkDescription" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Image URL</label>
                    <input type="text" class="form-control" id="artworkImage" placeholder="https://placehold.co/600x400" required>
                </div>
                <button type="submit" class="btn-primary-custom w-100">Upload Artwork</button>
            </form>
        </div>
    </div>

    <script>
        function getUrlParam(name) {
            var urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        var artistName = getUrlParam('name');
        if(!artistName) {
            artistName = 'Guest Artist';
        }
        
        document.getElementById('artistNameDisplay').innerText = artistName;
        
        var artworks = [];
        var orders = [
            { id: '#ORD-001', artwork: 'Sunset Dreams', buyer: 'James Wilson', amount: 450, status: 'completed', date: '2024-03-15' },
            { id: '#ORD-002', artwork: 'Bronze Warrior', buyer: 'Michael Brown', amount: 1200, status: 'pending', date: '2024-03-18' },
            { id: '#ORD-003', artwork: 'Beaded Crown', buyer: 'Lisa Wong', amount: 89, status: 'shipped', date: '2024-03-20' }
        ];
        
        var messages = [
            { from: 'James Wilson', message: 'Is this piece still available?', date: '2024-03-17', read: false },
            { from: 'Michael Brown', message: 'Can you do custom work?', date: '2024-03-19', read: true },
            { from: 'Lisa Wong', message: 'When will you ship?', date: '2024-03-21', read: false }
        ];
        
        function renderOverview() {
            var totalArtworks = artworks.length;
            var totalSales = 0;
            var pendingOrders = 0;
            
            for(var i = 0; i < orders.length; i++) {
                if(orders[i].status === 'completed') {
                    totalSales = totalSales + orders[i].amount;
                }
                if(orders[i].status === 'pending') {
                    pendingOrders = pendingOrders + 1;
                }
            }
            
            var recentRows = '';
            for(var j = 0; j < orders.length && j < 3; j++) {
                var statusClass = orders[j].status === 'completed' ? 'active' : (orders[j].status === 'shipped' ? 'shipped' : 'pending');
                recentRows += '<tr>' +
                    '<td>' + orders[j].id + '</td>' +
                    '<td>' + orders[j].artwork + '</td>' +
                    '<td>' + orders[j].buyer + '</td>' +
                    '<td>$' + orders[j].amount + '</td>' +
                    '<td><span class="badge-' + statusClass + '">' + orders[j].status + '</span></td>' +
                '</tr>';
            }
            
            return '<div class="dashboard-card">' +
                '<h3 class="fw-bold mb-4">Welcome back, ' + artistName + '!</h3>' +
                '<p class="text-secondary mb-4">Your creative journey at a glance</p>' +
                '<div class="row">' +
                    '<div class="col-md-4 mb-3">' +
                        '<div class="dashboard-card text-center">' +
                            '<div class="stat-number">' + totalArtworks + '</div>' +
                            '<div class="stat-label">Total Artworks</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="col-md-4 mb-3">' +
                        '<div class="dashboard-card text-center">' +
                            '<div class="stat-number">$' + totalSales + '</div>' +
                            '<div class="stat-label">Total Revenue</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="col-md-4 mb-3">' +
                        '<div class="dashboard-card text-center">' +
                            '<div class="stat-number">' + pendingOrders + '</div>' +
                            '<div class="stat-label">Pending Orders</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            '<div class="dashboard-card">' +
                '<h4 class="fw-bold mb-3">Recent Activity</h4>' +
                '<div class="table-responsive">' +
                    '<table class="table-custom">' +
                        '<thead><tr><th>Order ID</th><th>Artwork</th><th>Buyer</th><th>Amount</th><th>Status</th></tr></thead>' +
                        '<tbody>' + recentRows + '</tbody>' +
                    '</table>' +
                '</div>' +
            '</div>';
        }
        
        function renderArtworks() {
            if(artworks.length === 0) {
                return '<div class="dashboard-card">' +
                    '<h3 class="fw-bold mb-4">My Artworks</h3>' +
                    '<p class="text-secondary">You haven\'t uploaded any artworks yet.</p>' +
                    '<button class="btn-primary-custom" id="uploadFromEmptyBtn">Upload Your First Artwork</button>' +
                '</div>';
            }
            
            var tableRows = '';
            for(var i = 0; i < artworks.length; i++) {
                tableRows += '<tr>' +
                    '<td><img src="' + artworks[i].image + '" width="50" height="50" style="object-fit:cover; border-radius:8px;"></td>' +
                    '<td>' + artworks[i].title + '</td>' +
                    '<td>' + artworks[i].category + '</td>' +
                    '<td>$' + artworks[i].price + '</td>' +
                    '<td><span class="badge-active">Listed</span></td>' +
                    '<td><button class="btn-sm-danger delete-artwork" data-index="' + i + '">Delete</button></td>' +
                '</tr>';
            }
            
            return '<div class="dashboard-card">' +
                '<h3 class="fw-bold mb-4">My Artworks</h3>' +
                '<div class="table-responsive">' +
                    '<table class="table-custom">' +
                        '<thead><tr><th>Image</th><th>Title</th><th>Category</th><th>Price</th><th>Status</th><th>Action</th></tr></thead>' +
                        '<tbody>' + tableRows + '</tbody>' +
                    '</table>' +
                '</div>' +
            '</div>';
        }
        
        function renderUpload() {
            return '<div class="dashboard-card">' +
                '<h3 class="fw-bold mb-4">Upload New Artwork</h3>' +
                '<button class="btn-primary-custom" id="showUploadBtn">+ Upload Artwork</button>' +
            '</div>';
        }
        
        function renderOrders() {
            var tableRows = '';
            for(var i = 0; i < orders.length; i++) {
                var statusClass = orders[i].status === 'completed' ? 'active' : (orders[i].status === 'shipped' ? 'shipped' : 'pending');
                tableRows += '<tr>' +
                    '<td>' + orders[i].id + '</td>' +
                    '<td>' + orders[i].artwork + '</td>' +
                    '<td>' + orders[i].buyer + '</td>' +
                    '<td>$' + orders[i].amount + '</td>' +
                    '<td>' + orders[i].date + '</td>' +
                    '<td><span class="badge-' + statusClass + '">' + orders[i].status + '</span></td>' +
                    '<td>' + (orders[i].status === 'pending' ? '<button class="btn-sm-warning update-order" data-order="' + orders[i].id + '">Update Status</button>' : '-') + '</td>' +
                '</tr>';
            }
            
            return '<div class="dashboard-card">' +
                '<h3 class="fw-bold mb-4">My Sales</h3>' +
                '<div class="table-responsive">' +
                    '<table class="table-custom">' +
                        '<thead><tr><th>Order ID</th><th>Artwork</th><th>Buyer</th><th>Amount</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>' +
                        '<tbody>' + tableRows + '</tbody>' +
                    '</table>' +
                '</div>' +
            '</div>';
        }
        
        function renderMessages() {
            var messageHtml = '<div class="dashboard-card"><h3 class="fw-bold mb-4">Messages</h3><div>';
            for(var i = 0; i < messages.length; i++) {
                messageHtml += '<div class="dashboard-card" style="margin-bottom:0.75rem;">' +
                    '<div style="display:flex; justify-content:space-between;">' +
                        '<strong style="color:#e67300;">' + messages[i].from + '</strong>' +
                        '<small class="text-secondary">' + messages[i].date + '</small>' +
                    '</div>' +
                    '<p class="mt-2 mb-1">' + messages[i].message + '</p>';
                if(!messages[i].read) {
                    messageHtml += '<span class="badge-active" style="font-size:0.7rem;">New</span>';
                }
                messageHtml += '</div>';
            }
            messageHtml += '</div></div>';
            return messageHtml;
        }
        
        function renderProfile() {
            return '<div class="dashboard-card">' +
                '<h3 class="fw-bold mb-4">My Profile</h3>' +
                '<form id="profileForm">' +
                    '<div class="mb-3">' +
                        '<label class="form-label fw-semibold">Display Name</label>' +
                        '<input type="text" class="form-control" id="profileName" value="' + artistName + '">' +
                    '</div>' +
                    '<div class="mb-3">' +
                        '<label class="form-label fw-semibold">Email</label>' +
                        '<input type="email" class="form-control" id="profileEmail" value="artist@example.com">' +
                    '</div>' +
                    '<div class="mb-3">' +
                        '<label class="form-label fw-semibold">Bio</label>' +
                        '<textarea class="form-control" id="profileBio" rows="3">Passionate artist creating unique pieces.</textarea>' +
                    '</div>' +
                    '<button type="submit" class="btn-primary-custom">Save Changes</button>' +
                '</form>' +
            '</div>';
        }
        
        function loadTab(tabName) {
            var content = '';
            if(tabName === 'overview') {
                content = renderOverview();
            } else if(tabName === 'artworks') {
                content = renderArtworks();
            } else if(tabName === 'upload') {
                content = renderUpload();
            } else if(tabName === 'orders') {
                content = renderOrders();
            } else if(tabName === 'messages') {
                content = renderMessages();
            } else if(tabName === 'profile') {
                content = renderProfile();
            } else {
                content = renderOverview();
            }
            document.getElementById('mainContent').innerHTML = content;
            
            if(tabName === 'upload') {
                var uploadBtn = document.getElementById('showUploadBtn');
                if(uploadBtn) {
                    uploadBtn.onclick = function() {
                        document.getElementById('uploadModal').style.display = 'block';
                    };
                }
            }
            
            if(tabName === 'artworks') {
                var deleteBtns = document.getElementsByClassName('delete-artwork');
                for(var i = 0; i < deleteBtns.length; i++) {
                    deleteBtns[i].onclick = function(e) {
                        var idx = this.getAttribute('data-index');
                        if(confirm('Delete this artwork?')) {
                            artworks.splice(idx, 1);
                            loadTab('artworks');
                        }
                    };
                }
                var uploadEmptyBtn = document.getElementById('uploadFromEmptyBtn');
                if(uploadEmptyBtn) {
                    uploadEmptyBtn.onclick = function() {
                        document.getElementById('uploadModal').style.display = 'block';
                    };
                }
            }
            
            if(tabName === 'orders') {
                var updateBtns = document.getElementsByClassName('update-order');
                for(var j = 0; j < updateBtns.length; j++) {
                    updateBtns[j].onclick = function() {
                        alert('Order status updated to Shipped');
                    };
                }
            }
            
            if(tabName === 'profile') {
                var profileForm = document.getElementById('profileForm');
                if(profileForm) {
                    profileForm.onsubmit = function(e) {
                        e.preventDefault();
                        alert('Profile updated successfully!');
                    };
                }
            }
        }
        
        var navItems = document.getElementsByClassName('nav-item-custom');
        for(var i = 0; i < navItems.length; i++) {
            navItems[i].onclick = function() {
                var tab = this.getAttribute('data-tab');
                for(var j = 0; j < navItems.length; j++) {
                    navItems[j].classList.remove('active');
                }
                this.classList.add('active');
                loadTab(tab);
            };
        }
        
        var uploadForm = document.getElementById('uploadForm');
        uploadForm.onsubmit = function(e) {
            e.preventDefault();
            var title = document.getElementById('artworkTitle').value;
            var category = document.getElementById('artworkCategory').value;
            var price = document.getElementById('artworkPrice').value;
            var description = document.getElementById('artworkDescription').value;
            var image = document.getElementById('artworkImage').value;
            
            if(title && category && price && description && image) {
                artworks.push({
                    title: title,
                    category: category,
                    price: price,
                    description: description,
                    image: image
                });
                document.getElementById('uploadModal').style.display = 'none';
                document.getElementById('uploadForm').reset();
                alert('Artwork uploaded successfully!');
                var activeTab = document.querySelector('.nav-item-custom.active').getAttribute('data-tab');
                if(activeTab === 'artworks') {
                    loadTab('artworks');
                }
            } else {
                alert('Please fill all fields');
            }
        };
        
        var closeBtn = document.getElementById('closeModalBtn');
        closeBtn.onclick = function() {
            document.getElementById('uploadModal').style.display = 'none';
        };
        
        window.onclick = function(e) {
            var modal = document.getElementById('uploadModal');
            if(e.target === modal) {
                modal.style.display = 'none';
            }
        };
        
        var logoutButton = document.getElementById('logoutBtn');
        logoutButton.onclick = function() {
            window.location.href = 'index.html';
        };
        
        loadTab('overview');
    </script>
</body>
</html>
