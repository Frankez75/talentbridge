<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentBridge · Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F9F9FB 0%, #e8e8e0 100%);
            color: #111100;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }
        .login-card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid #efefe7;
            box-shadow: 0 20px 48px rgba(0,0,0,0.08);
            animation: fadeInUp 0.5s ease-out;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo a {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .login-logo a span {
            color: #e67300;
        }
        .login-logo p {
            color: #6c6c5a;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .admin-badge {
            display: inline-block;
            background-color: #111100;
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        .form-control {
            border: 1.5px solid #e0e0d5;
            border-radius: 16px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background: #FFFFFF;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #e67300;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230,115,0,0.1);
        }
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #111100;
        }
        .btn-login {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 700;
            padding: 0.85rem;
            border-radius: 40px;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #cc6600;
            transform: scale(1.01);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-back {
            background: transparent;
            border: 1.5px solid #111100;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            background-color: #111100;
            color: #FFFFFF;
            transform: scale(1.02);
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show {
            display: block;
            animation: shake 0.4s ease-out;
        }
        .input-group-icon {
            position: relative;
        }
        .input-group-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6c6c5a;
            font-size: 1.1rem;
        }
        .input-group-icon .form-control {
            padding-left: 2.8rem;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c6c5a;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0;
        }
        .password-toggle:hover {
            color: #e67300;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0d5;
        }
        .divider span {
            padding: 0 1rem;
            color: #6c6c5a;
            font-size: 0.85rem;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #28a745;
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <a href="index.html">Talent<span>Bridge</span></a>
                <div class="mt-2">
                    <span class="admin-badge"><i class="bi bi-shield-lock"></i> Admin Portal</span>
                </div>
                <p>Secure access for administrators</p>
                <div class="security-badge">
                    <i class="bi bi-shield-lock-fill"></i> SSL Secure
                </div>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="bi bi-exclamation-circle"></i> <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <form id="adminLoginForm">
                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-envelope"></i> Admin Email</label>
                    <div class="input-group-icon">
                        <i class="bi bi-person-circle"></i>
                        <input type="email" class="form-control" id="adminEmail" placeholder="admin@talentbridge.com" required value="admin@talentbridge.com">
                    </div>
                    <div class="invalid-feedback" id="emailError">Please enter a valid email address.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                    <div class="input-group-icon">
                        <i class="bi bi-key"></i>
                        <input type="password" class="form-control" id="adminPassword" placeholder="••••••••" required value="admin123">
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" id="passwordError">Please enter your password.</div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In as Admin
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="text-center">
                <a href="login.html" class="btn-back">
                    <i class="bi bi-arrow-left"></i> Back to User Login
                </a>
            </div>

            <div class="text-center mt-3">
                <small class="text-secondary">
                    <i class="bi bi-info-circle"></i> Default: admin@talentbridge.com / admin123
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            let adminLoggedIn = localStorage.getItem('tb_admin_logged_in');
            let userType = localStorage.getItem('tb_user_type');
            if(adminLoggedIn === 'true' && userType === 'admin') {
                window.location.href = 'admin-dashboard.html';
            }

            $('#togglePassword').click(function() {
                let input = $('#adminPassword');
                let type = input.attr('type') === 'password' ? 'text' : 'password';
                input.attr('type', type);
                $(this).find('i').toggleClass('bi-eye bi-eye-slash');
            });

            $('#adminLoginForm').submit(function(e) {
                e.preventDefault();
                let isValid = true;

                let email = $('#adminEmail').val().trim();
                let password = $('#adminPassword').val();

                $('#emailError').hide();
                $('#passwordError').hide();
                $('#errorMessage').removeClass('show');

                if(!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                    $('#emailError').show();
                    isValid = false;
                }

                if(password.length < 1) {
                    $('#passwordError').show();
                    isValid = false;
                }

                if(!isValid) {
                    $('#errorText').text('Please fix the errors above.');
                    $('#errorMessage').addClass('show');
                    return;
                }

                $('#loginBtn').prop('disabled', true);
                $('#loginBtn').html('<span class="spinner-border spinner-border-sm me-2"></span> Authenticating...');

                setTimeout(function() {
                    let adminUsers = JSON.parse(localStorage.getItem('tb_admin_users')) || [
                        {
                            id: 7,
                            name: 'Admin User',
                            email: 'admin@talentbridge.com',
                            password: 'admin123',
                            role: 'admin',
                            status: 'active',
                            joined: '2024-01-01'
                        }
                    ];

                    let user = null;
                    for(let i = 0; i < adminUsers.length; i++) {
                        if(adminUsers[i].email === email && adminUsers[i].password === password && adminUsers[i].role === 'admin') {
                            user = adminUsers[i];
                            break;
                        }
                    }

                    if(user) {
                        if(user.status === 'suspended') {
                            $('#loginBtn').prop('disabled', false);
                            $('#loginBtn').html('<i class="bi bi-box-arrow-in-right"></i> Sign In as Admin');
                            $('#errorText').text('Your admin account has been suspended. Please contact support.');
                            $('#errorMessage').addClass('show');
                            return;
                        }

                        localStorage.setItem('tb_user_type', 'admin');
                        localStorage.setItem('tb_user_name', user.name);
                        localStorage.setItem('tb_user_email', user.email);
                        localStorage.setItem('tb_admin_logged_in', 'true');

                        $('#errorMessage').removeClass('show');
                        $('#loginBtn').html('<i class="bi bi-check-circle"></i> Success! Redirecting...');

                        setTimeout(function() {
                            window.location.href = 'admin-dashboard.html';
                        }, 500);
                    } else {
                        $('#loginBtn').prop('disabled', false);
                        $('#loginBtn').html('<i class="bi bi-box-arrow-in-right"></i> Sign In as Admin');
                        $('#errorText').text('Invalid admin credentials. Please check your email and password.');
                        $('#errorMessage').addClass('show');
                    }
                }, 800);
            });

            $('#adminEmail, #adminPassword').on('input', function() {
                $('#errorMessage').removeClass('show');
            });
        });
    </script>
</body>
</html>
