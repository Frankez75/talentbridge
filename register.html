<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    ‎<meta name= "author"  content= "TalentBridge"
‎<meta name="description" content="A platforms for the talents that just need an opportunity">
    <title>TalentBridge · Register</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.css">

<link rel="stylesheet" href="all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9F9FB;
            color: #111100;
            min-height: 100vh;
        }
        .navbar {
            background-color: #FFFFFF;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(17, 17, 0, 0.05);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            color: #111100;
            text-decoration: none;
        }
        .navbar-brand span {
            color: #e67300;
        }
        .register-card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 12px 30px rgba(17, 17, 0, 0.06);
            border: 1px solid #efefe7;
        }
        .form-control {
            border: 1.5px solid #e0e0d5;
            border-radius: 16px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background: #FFFFFF;
        }
        .form-control:focus {
            border-color: #e67300;
            outline: none;
            box-shadow: none;
        }
        .btn-register {
            background-color: #e67300;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.85rem;
            border-radius: 40px;
            font-size: 1rem;
            width: 100%;
        }
        .btn-register:hover {
            background-color: #cc6600;
            color: white;
        }
        .role-option {
            border: 2px solid #e0e0d5;
            border-radius: 20px;
            padding: 1.25rem;
            text-align: center;
        }
        .role-option input {
            display: none;
        }
        .role-option.selected {
            border-color: #e67300;
            background-color: #fff4eb;
        }
        .role-option i {
            font-size: 2rem;
            color: #e67300;
            margin-bottom: 0.75rem;
            display: block;
        }
        .role-option h5 {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .role-option p {
            font-size: 0.8rem;
            color: #6c6c5a;
            margin: 0;
        }
        .text-accent {
            color: #e67300;
        }
        .btn-outline-custom {
            border: 1.5px solid #111100;
            background: transparent;
            color: #111100;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline-custom:hover {
            background-color: #111100;
            color: #FFFFFF;
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">Talent<span>Bridge</span></a>
        </div>
    </nav>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
        <div class="col-md-6 col-lg-5">
            <div class="register-card">
                <h2 class="fw-bold mb-2" style="color: #111100;">Join TalentBridge</h2>
                <p class="text-secondary mb-4">Choose your role and start your journey</p>
                <form id="registerForm" action="index.html" method="GET">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full name</label>
                        <input type="text" class="form-control" name="fullname" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email address</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold mb-3">I want to join as:</label>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="role-option" id="artistLabel">
                                    <i class="bi bi-brush"></i>
                                    <h5>Artist</h5>
                                    <p>Sell & showcase my work</p>
                                    <input type="radio" name="userType" value="artist">
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="role-option" id="patronLabel">
                                    <i class="bi bi-gem"></i>
                                    <h5>Patron</h5>
                                    <p>Discover & buy art</p>
                                    <input type="radio" name="userType" value="patron">
                                </label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-register mb-3">Create account</button>
                </form>
                <div class="text-center mt-2">
                    <span class="text-secondary">Already have an account? </span>
                    <a href="login.html" class="text-accent fw-semibold">Sign in</a>
                </div>
                <div class="text-center mt-3">
                    <a href="index.html" class="btn-outline-custom d-inline-block" style="font-size: 0.85rem;">← Back to home</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        function handleRoleSelection() {
            var artistRadio = document.getElementById('artistLabel').getElementsByTagName('input')[0];
            var patronRadio = document.getElementById('patronLabel').getElementsByTagName('input')[0];
            var artistDiv = document.getElementById('artistLabel');
            var patronDiv = document.getElementById('patronLabel');
            
            if(artistRadio.checked) {
                artistDiv.classList.add('selected');
                patronDiv.classList.remove('selected');
            } else if(patronRadio.checked) {
                patronDiv.classList.add('selected');
                artistDiv.classList.remove('selected');
            } else {
                artistDiv.classList.remove('selected');
                patronDiv.classList.remove('selected');
            }
        }
        
        var artistContainer = document.getElementById('artistLabel');
        var patronContainer = document.getElementById('patronLabel');
        var artistInput = artistContainer.getElementsByTagName('input')[0];
        var patronInput = patronContainer.getElementsByTagName('input')[0];
        
        artistContainer.onclick = function() {artistInput.checked = true;
            handleRoleSelection();
        };
        
        patronContainer.onclick = function() {patronInput.checked = true;
            handleRoleSelection();
        };
        
        artistInput.onchange = handleRoleSelection;
        patronInput.onchange = handleRoleSelection;
    </script>
</body>
</html>
